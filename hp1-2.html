<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập HP1+HP2 - Trắc nghiệm</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fc;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px 25px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #1a2b4a;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            color: #6b7a8f;
            margin-bottom: 30px;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 15px;
        }

        .question-block {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px 20px 20px 20px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .question-block:hover {
            border-color: #b0c4de;
        }

        .q-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 17px;
            color: #1e2f4e;
        }

        .q-number {
            background: #1a2b4a;
            color: #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .q-text {
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
            padding-left: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.15s ease;
            background: #fafcff;
        }

        .option:hover {
            background: #f0f5ff;
            border-color: #a0b8d4;
        }

        .option .label {
            font-weight: 600;
            color: #2c3e66;
            min-width: 24px;
        }

        .option .text {
            flex: 1;
        }

        /* Trạng thái */
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.correct .label {
            color: #155724;
        }

        .option.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.wrong .label {
            color: #721c24;
        }

        .option.disabled {
            cursor: default;
            opacity: 0.85;
        }

        .option.show-correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .result-badge {
            margin-top: 14px;
            font-weight: 500;
            font-size: 15px;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        .result-badge.correct {
            color: #155724;
            background: #d4edda;
        }

        .result-badge.wrong {
            color: #721c24;
            background: #f8d7da;
        }

        .btn-show-answers {
            display: block;
            margin: 25px auto 10px;
            padding: 12px 36px;
            background: #1a2b4a;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 8px rgba(26,43,74,0.25);
        }

        .btn-show-answers:hover {
            background: #2c3f66;
        }

        .btn-reset {
            display: inline-block;
            margin-left: 20px;
            padding: 10px 24px;
            background: #e2e8f0;
            color: #1a2b4a;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #cdd7e6;
        }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .progress {
            text-align: center;
            font-size: 16px;
            color: #4a5a72;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .option { font-size: 14px; padding: 8px 12px; }
            .q-header { font-size: 15px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>📘 ÔN TẬP LÝ THUYẾT HP1+HP2</h1>
    <div class="subtitle">Học thuyết bảo vệ Tổ quốc · Tư tưởng Hồ Chí Minh · Chiến tranh · Quốc phòng · An ninh</div>

    <div id="questions-container"></div>

    <div class="footer">
        <button class="btn-show-answers" id="showAllBtn">📌 Hiển thị tất cả đáp án đúng</button>
        <button class="btn-reset" id="resetBtn">🔄 Làm lại</button>
    </div>
    <div class="progress" id="progress"></div>
</div>

<script>

        { id: 2, text: 'Theo tư tưởng Hồ Chí Minh, sự ra đời của quân đội là:', options: ['Tính quy luật trong đấu tranh giai cấp, đấu tranh dân tộc ở Việt Nam.', 'Một tất yếu, là tính quy luật trong đấu tranh giai cấp, đấu tranh dân tộc ở Việt Nam.', 'Đúng quy luật trong đấu tranh giải phóng dân tộc ở Việt Nam.', 'Yêu cầu trong đấu tranh giành và giữ chính quyền ở Việt Nam.'], correct: 1 },

        { id: 4, text: 'Theo quan điểm chủ nghĩa Mác - Lênin: Chiến tranh kiểm tra sức sống của:', options: ['Đường lối quân sự và nghệ thuật quân sự.', 'Toàn bộ chế độ chính trị - xã hội.', 'Nền kinh tế xã hội.', 'Phương án a,c đúng.'], correct: 1 },
        { id: 5, text: 'Chủ tịch Hồ Chí Minh khẳng định Quân đội nhân dân Việt Nam có:', options: ['3 nhiệm vụ, 2 chức năng.', '3 nhiệm vụ, 3 chức năng.', '2 nhiệm vụ, 2 chức năng.', '2 nhiệm vụ, 3 chức năng.'], correct: 3 },
        { id: 6, text: 'Tư tưởng Hồ Chí Minh về bảo vệ Tổ quốc Việt Nam XHCN?', options: ['Bảo vệ Tổ quốc Việt Nam XHCN là tất yếu khách quan.', 'Mục tiêu bảo vệ Tổ quốc là độc lập dân tộc và CNXH là nghĩa vụ trách nhiệm của mọi công dân.', 'Xây dựng đất nước độc lập, dân giàu, nước mạnh, xã hội dân chủ, công bằng, văn minh.', 'Phương án a, b đúng.'], correct: 3 },
        { id: 7, text: 'Một trong những quan điểm chủ nghĩa Mác - Lênin về bảo vệ Tổ quốc XHCN là:', options: ['Bảo vệ Tổ quốc xã hội chủ nghĩa là một tất yếu khách quan.', 'Bảo vệ Tổ quốc là một tất yếu khách quan.', 'Bảo vệ Tổ quốc xã hội chủ nghĩa là nhiệm vụ tất yếu của quân đội.', 'Bảo vệ Tổ quốc là một qui luật khách quan.'], correct: 0 },
        { id: 8, text: 'Theo quan điểm của chủ nghĩa Mác - Lênin: Bảo vệ Tổ quốc xã hội chủ nghĩa, phải thường xuyên tăng cường:', options: ['Tiềm lực quốc phòng gắn với phát triển kinh tế xã hội.', 'Tiềm lực quân sự gắn với phát triển kinh tế - xã hội.', 'Sức mạnh quân sự gắn với phát triển kinh tế - xã hội.', 'Tiềm lực an ninh gắn với phát triển kinh tế xã hội.'], correct: 0 },
        { id: 9, text: 'Theo tư tưởng Hồ Chí Minh, sử dụng bạo lực cách mạng để:', options: ['Giải phóng dân tộc.', 'Giành chính quyền và bảo vệ chính quyền.', 'Xây dựng và bảo vệ chính quyền cách mạng.', 'Phương án a và c đúng.'], correct: 3 },
        { id: 10, text: 'Khi nói về bản chất của chủ nghĩa đế quốc, Hồ Chí Minh đã khái quát bằng hình ảnh:', options: ['Con rắn độc.', 'Con bạch tuộc.', 'Con rồng tre.', 'Con đĩa hai vòi.'], correct: 1 },
        { id: 11, text: '“Giành chính quyền đã khó, nhưng giữ được chính quyền còn khó khăn hơn”. Ai khẳng định?', options: ['C. Mác.', 'V.I Lênin.', 'Ph. Ăngghen.', 'Chủ tịch Hồ Chí Minh.'], correct: 3 },

        { id: 15, text: 'Lênin khẳng định: “Trong mọi cuộc chiến tranh rốt cuộc thắng lợi đều tùy thuộc vào”:', options: ['Tinh thần của quần chúng đang đổ máu trên chiến trường quyết định.', 'Khả năng cơ động của quần chúng trên chiến trường quyết định.', 'Con người và vũ khí trên chiến trường quyết định.', 'Con người với trình độ sẵn sàng chiến đấu cao giữ vai trò quyết định.'], correct: 0 },
        { id: 16, text: 'Theo quan điểm của C.Mác - Ph.Ăngghen: con người, kinh tế, chính trị, văn hóa, xã hội, vũ khí trang bị, khoa học quân sự, Được xác định là:', options: ['Bản chất giai cấp của quân đội.', 'Sức mạnh chiến đấu của quân đội.', 'Nguyên tắc xây dựng quân đội.', 'Nguồn gốc ra đời của quân đội.'], correct: 1 },
        { id: 17, text: '“Dân tộc Việt Nam nhất định phải được giải phóng. Muốn đánh chúng phải có lực lượng quân sự, phải có tổ chức”. Ai khẳng định?', options: ['Chủ Tịch Hồ Chí Minh.', 'Chủ tịch Tôn Đức Thắng.', 'Thủ tướng Phạm Văn Đồng.', 'Đại tướng Võ Nguyên Giáp.'], correct: 0 },
        { id: 18, text: 'Khi bàn về chiến tranh, Claudovit đã quan niệm: Chiến tranh là một hành vi bạo lực. Nhưng lại không lý giải được:', options: ['Bản chất của chiến tranh.', 'Quy luật của chiến tranh.', 'Tính chất của chiến tranh.', 'Đặc điểm của chiến tranh.'], correct: 0 },
        { id: 19, text: 'Chọn câu sai. Nguyên tắc xây dựng quân đội kiểu mới của V.I Lênin?', options: ['Đoàn kết thống nhất quân đội với nhân dân.', 'Xây dựng quân đội chính quy.', 'Trung thành với chủ nghĩa quốc tế vô sản.', 'Xây dựng quân đội làm công cụ bạo lực sắc bén.'], correct: 3 },
        { id: 20, text: 'Muốn xóa bỏ chiến tranh phải xóa bỏ:', options: ['Mâu thuẫn chính trị xã hội.', 'Lực lượng quân đội.', 'Nguồn gốc kinh tế, xã hội.', 'Nguồn gốc kinh tế, chính trị.'], correct: 2 },

        { id: 22, text: 'Không ngừng hoàn thiện cơ cấu tổ chức; phát triển hài hòa các quân binh chủng, Được xác định là một trong những:', options: ['Nguyên tắc xây dựng quân đội kiểu mới của V.I.Lênin.', 'Nguyên tắc xây dựng quân đội kiểu mới của C.Mác.', 'Nguyên tắc xây dựng quân đội kiểu mới của Hồ Chí Minh.', 'Nguyên tắc xây dựng quân đội kiểu mới của Ph.Ăngghen.'], correct: 0 },

        { id: 29, text: 'Nền quốc phòng, an ninh vì dân, của dân và do toàn thể nhân dân tiến hành. Được xác định là một trong những:', options: ['Đặc trưng nền quốc phòng toàn dân, an ninh nhân dân.', 'Vị trí nền quốc phòng toàn dân, an ninh nhân dân.', 'Nhiệm vụ xây dựng nền quốc phòng và an ninh.', 'Biện pháp xây dựng nền quốc phòng toàn dân, an ninh nhân dân.'], correct: 0 },
        { id: 30, text: 'Xây dựng lực lượng quốc phòng và an ninh đáp ứng yêu cầu bảo vệ vững chắc Tổ quốc Việt Nam xã hội chủ nghĩa. Được xác định là một trong những:', options: ['Đặc trưng nền quốc phòng toàn dân, an ninh nhân dân.', 'Vị trí nền quốc phòng toàn dân, an ninh nhân dân.', 'Nhiệm vụ xây dựng nền quốc phòng và an ninh.', 'Biện pháp xây dựng nền quốc phòng toàn dân, an ninh nhân dân.'], correct: 2 },
        { id: 31, text: 'Điền vào chỗ (...) cho hoàn chỉnh khái niệm về quốc phòng: Quốc phòng là công cuộc giữ nước bằng sức mạnh tổng hợp của toàn dân tộc, trong đó sức mạnh quân sự là đặc trưng ...', options: ['Lực lượng vũ trang nhân dân làm nòng cốt.', 'Quân đội làm nòng cốt.', 'Công an làm nòng cốt.', 'Dân quân tự vệ làm nòng cốt.'], correct: 0 },
        { id: 32, text: 'Nội dung cơ bản xây dựng nền quốc phòng toàn dân theo Điểm b, Khoản 2, Điều 7, Luật quốc phòng 2018 là:', options: ['Xây dựng thực lực, tiềm lực quốc phòng; xây dựng lực lượng vũ trang nhân dân vững mạnh, có sức chiến đấu cao, làm nòng cốt bảo vệ Tổ quốc.', 'Xây dựng kế hoạch, tổ chức chuẩn bị và thực hiện phòng thủ quân khu.', 'Xây dựng cơ quan, đơn vị của quân khu vững mạnh toàn diện.', 'Xây dựng kế hoạch và chỉ đạo, hướng dẫn cơ quan, đơn vị của quân khu.'], correct: 0 },
        { id: 33, text: 'Nền quốc phòng toàn dân là sức mạnh quốc phòng của đất nước, được xây dựng trên nền tảng chính trị, tinh thần, nhân lực, vật lực, tài chính, mang tính chất toàn dân, toàn diện, độc lập, tự chủ, tự cường. Được quy định tại:', options: ['Khoản 1, Điều 7, Luật quốc phòng 2018.', 'Khoản 1, Điều 8, Luật quốc phòng 2018.', 'Khoản 1, Điều 9, Luật quốc phòng 2018.', 'Khoản 1, Điều 10, Luật quốc phòng 2018.'], correct: 0 },
        { id: 34, text: 'Nền quốc phòng toàn dân, an ninh nhân dân được xây dựng toàn diện và từng bước hiện đại. Được xác định là một trong những:', options: ['Đặc trưng nền quốc phòng toàn dân, an ninh nhân dân.', 'Vị trí nền quốc phòng toàn dân, an ninh nhân dân.', 'Nội dung nền quốc phòng toàn dân, an ninh nhân dân.', 'Biện pháp xây dựng nền quốc phòng toàn dân, an ninh nhân dân.'], correct: 0 },
        { id: 35, text: 'Điền vào chỗ (...) cho hoàn chỉnh khái niệm về tiềm lực chính trị, tinh thần: Tiềm lực chính trị, tinh thần là khả năng về chính trị, tinh thần có thể huy động tạo nên sức mạnh để thực hiện nhiệm vụ ...', options: ['Quốc phòng và an ninh.', 'Khoa học công nghệ.', 'Phát triển kinh tế.', 'Phát triển văn hóa xã hội.'], correct: 0 },
        { id: 36, text: 'Trong xây dựng nền quốc phòng toàn dân và an ninh nhân dân cần tập trung vào những tiềm lực chủ yếu nào sau đây?', options: ['Tiềm lực chính trị, tinh thần, tiềm lực kinh tế, tiềm lực văn hóa, xã hội.', 'Tiềm lực con người; tiềm lực rừng, biển; tiềm lực quân sự, an ninh.', 'Tiềm lực chính trị, tinh thần, tiềm lực kinh tế, tiềm lực quân sự, an ninh, tiềm lực khoa học công nghệ.', 'Tiềm lực kinh tế, tiềm lực quân sự, an ninh, tiềm lực giáo dục và đào tạo, tiềm lực ngoại giao.'], correct: 2 },
        { id: 37, text: 'Tiềm lực nào sau đây là cơ sở vật chất cho các tiềm lực khác trong xây dựng nền quốc phòng toàn dân, an ninh nhân dân', options: ['Tiềm lực chính trị, tinh thần.', 'Tiềm lực kinh tế.', 'Tiềm lực quân sự, an ninh.', 'Tiềm lực khoa học, công nghệ.'], correct: 1 },
        { id: 38, text: 'Thực chất của việc xây dựng tiềm lực chính trị, tinh thần là:', options: ['Xây dựng nhân tố con người mới Việt Nam xã hội chủ nghĩa.', 'Xây dựng lực lượng tiến hành công tác tư tưởng.', 'Xây dựng thế trận lòng dân.', 'Xây dựng hệ thống chính trị trong thời chiến.'], correct: 2 },
        { id: 39, text: 'Tiềm lực chính trị, tinh thần của nền quốc phòng toàn dân, an ninh nhân dân. Được xác định là:', options: ['Nhân tố không cần thiết tạo nên sức mạnh của quốc phòng và an ninh.', 'Nhân tố không quyết định tạo nên sức mạnh của quốc phòng và an ninh.', 'Nhân tố cơ bản tạo nên sức mạnh của quốc phòng và an ninh.', 'Nhân tố không cơ bản tạo nên sức mạnh của quốc phòng và an ninh.'], correct: 2 },
        { id: 40, text: 'Thế trận quốc phòng và an ninh là sự tổ chức, bố trí lực lượng, tiềm lực mọi mặt của đất nước và của toàn dân trên toàn lãnh thổ theo yêu cầu của quốc phòng và an ninh để bảo vệ Tổ quốc. Được xác định là:', options: ['Khái niệm về thế trận quốc phòng và an ninh.', 'Khái niệm về tiềm lực chính trị, tinh thần.', 'Khái niệm về tiềm lực kinh tế.', 'Khái niệm về nền quốc phòng toàn dân và an ninh nhân dân.'], correct: 0 },
        { id: 41, text: '“Xây dựng thế trận quốc phòng toàn dân kết hợp chặt chẽ với thế trận an ninh nhân dân vững chắc”. Đảng ta khẳng định trong:', options: ['Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ VIII.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ IX.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ X.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XI.'], correct: 3 },
        { id: 42, text: '“Giáo dục quốc phòng và an ninh cho học sinh, sinh viên, người học trong các trường của cơ quan nhà nước, tổ chức chính trị, tổ chức chính trị - xã hội, cơ sở giáo dục thuộc hệ thống giáo dục quốc dân”. Được quy định tại:', options: ['Điểm a, Khoản 2, Điều 10, Luật Quốc phòng năm 2018.', 'Điểm a, Khoản 2, Điều 9, Luật Quốc phòng năm 2018.', 'Điểm a, Khoản 2, Điều 11, Luật Quốc phòng năm 2018.', 'Điểm a, Khoản 2, Điều 8, Luật Quốc phòng năm 2018.'], correct: 0 },
        { id: 43, text: 'Cơ chế lãnh đạo, chỉ huy nền quốc phòng toàn dân và an ninh nhân dân. Do tổ chức nào lãnh đạo, quản lý?', options: ['Đảng lãnh đạo, nhà nước thống nhất quản lý.', 'Quân đội chỉ huy, quản lý.', 'Nhân dân tự nguyện tham gia.', 'Bộ quốc phòng lãnh đạo, chỉ huy.'], correct: 0 },
        { id: 44, text: '“Giữ vững và tăng cường sự lãnh đạo tuyệt đối, trực tiếp về mọi mặt của Đảng, sự quản lý tập trung, thống nhất của Nhà nước đối với quân đội nhân dân, công an nhân dân và sự nghiệp quốc phòng, an ninh”. Đảng ta khẳng định trong:', options: ['Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XIII.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XII.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XI.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ X.'], correct: 0 },
        { id: 45, text: '“Không quân đội nào, không khí giới nào có thể đánh ngã được tinh thần hy sinh của toàn thể một dân tộc”. Ai khẳng định:', options: ['C. Mác.', 'Ph. Ăngghen.', 'V.I. Lênin.', 'Hồ Chí Minh.'], correct: 3 },
        { id: 46, text: 'Nền quốc phòng toàn dân gắn chặt với nền an ninh nhân dân. Được xác định là một trong những:', options: ['Đặc trưng của nền quốc phòng toàn dân và an ninh nhân dân.', 'Vị trí của nền quốc phòng toàn dân và an ninh nhân dân.', 'Khái niệm của nền quốc phòng toàn dân và an ninh nhân dân.', 'Mục đích của nền quốc phòng toàn dân và an ninh nhân dân.'], correct: 0 },
        { id: 47, text: 'Khả năng về vật chất và tinh thần có thể huy động tạo thành sức mạnh phục vụ cho nhiệm vụ quân sự, an ninh, cho chiến tranh. Được xác định là:', options: ['Khái niệm về tiềm lực quân sự, an ninh.', 'Khái niệm về tiềm lực kinh tế.', 'Khái niệm về tiềm lực khoa học, công nghệ.', 'Khái niệm về tiềm lực chính trị, tinh thần.'], correct: 0 },
        { id: 48, text: 'Tăng cường sự lãnh đạo của Đảng, sự quản lý của Nhà nước, trách nhiệm triển khai thực hiện của các cơ quan, tổ chức và nhân dân đối với xây dựng nền quốc phòng toàn dân, an ninh nhân dân. Được xác định là một trong những:', options: ['Biện pháp chính xây dựng nền quốc phòng toàn dân, an ninh nhân dân hiện nay.', 'Nhiệm vụ chính xây dựng nền quốc phòng toàn dân, an ninh nhân dân hiện nay.', 'Mục đích chính xây dựng nền quốc phòng toàn dân, an ninh nhân dân hiện nay.', 'Vị trí xây dựng nền quốc phòng toàn dân, an ninh nhân dân hiện nay.'], correct: 0 },
        { id: 49, text: 'Nâng cao ý thức trách nhiệm công dân cho sinh viên trong xây dựng nền quốc phòng toàn dân, an ninh nhân dân. Được xác định là một trong những:', options: ['Biện pháp chính xây dựng nền quốc phòng toàn dân, an ninh nhân dân hiện nay.', 'Nhiệm vụ chính xây dựng nền quốc phòng toàn dân, an ninh nhân dân hiện nay.', 'Mục đích chính xây dựng nền quốc phòng toàn dân, an ninh nhân dân hiện nay.', 'Vị trí xây dựng nền quốc phòng toàn dân, an ninh nhân dân hiện nay.'], correct: 0 },
        { id: 50, text: 'Đối tượng tác chiến của chiến tranh nhân dân là:', options: ['Chủ nghĩa đế quốc và các thế lực phản động.', 'Chủ nghĩa tư bản.', 'Các nước xâm lược.', 'Các thế lực thù địch.'], correct: 0 },
        { id: 51, text: 'Đánh nhanh, thắng nhanh khi tiến hành chiến tranh xâm lược nước ta. Được hiểu là:', options: ['Âm mưu, thủ đoạn của địch.', 'Mục tiêu của địch.', 'Chiến lược của địch.', 'Phương châm của địch.'], correct: 0 },
        { id: 52, text: 'Địa hình thời tiết nước ta phức tạp khó khăn cho địch khi sử dụng lực lượng, phương tiện. Được xác định là:', options: ['Điểm mạnh của ta.', 'Điểm yếu của kẻ thù.', 'Điểm mạnh của địch.', 'Điểm yếu của ta.'], correct: 1 },
        { id: 53, text: 'Tiến hành chiến tranh toàn diện, kết hợp chặt chẽ giữa đấu tranh Quân sự, chính trị, ngoại giao, kinh tế, văn hóa và tư tưởng, lấy đấu tranh quân sự là chủ yếu, lấy thắng lợi trên chiến trường là yếu tố quyết định để giành thắng lợi trong chiến tranh. Được xác định là:', options: ['Quan điểm của Đảng trong chiến tranh nhân dân.', 'Nhiệm vụ của chiến tranh nhân dân.', 'Tính chất của chiến tranh nhân dân.', 'Mục đích của chiến tranh nhân dân.'], correct: 0 },
        { id: 54, text: 'Chuẩn bị mọi mặt trên cả nước cũng như từng khu vực để đủ sức đánh lâu dài, ra sức thu hẹp không gian, rút ngắn thời gian của chiến tranh... Được xác định là:', options: ['Quan điểm của Đảng trong chiến tranh nhân dân.', 'Nhiệm vụ của chiến tranh nhân dân.', 'Tính chất của chiến tranh nhân dân.', 'Mục đích của chiến tranh nhân dân.'], correct: 0 },
        { id: 55, text: 'Kết hợp kháng chiến với xây dựng, vừa kháng chiến vừa xây dựng, ra sức sản xuất thực hành tiết kiệm giữ gìn và bồi dưỡng lực lượng ta càng đánh càng mạnh. Được xác định là:', options: ['Quan điểm của Đảng trong chiến tranh nhân dân.', 'Nội dung của chiến tranh nhân dân.', 'Tính chất của chiến tranh nhân dân.', 'Mục đích của chiến tranh nhân dân.'], correct: 0 },
        { id: 56, text: 'Tiến hành chiến tranh nhân dân bảo vệ Tổ quốc phải phối hợp chặt chẽ giữa chống quân địch tiến công từ bên ngoài với ... từ bên trong.', options: ['Đấu tranh chính trị.', 'Tuyên truyền giáo dục.', 'Các phương án tác chiến.', 'Bạo loạn lật đổ.'], correct: 3 },
        { id: 57, text: 'Tổ chức thế trận chiến tranh nhân dân bảo vệ Tổ quốc là:', options: ['Bố trí lực lượng, vũ khí trang bị để tiến hành chiến tranh.', 'Bố trí lực lượng để tiến hành chiến tranh và hoạt động tác chiến.', 'Bố trí lực lượng để tiến hành chiến tranh.', 'Bố trí lực lượng để hoạt động tác chiến.'], correct: 1 },
        { id: 58, text: 'Yếu tố quyết định đến thắng lợi của chiến tranh nhân dân bảo vệ Tổ quốc Việt Nam xã hội chủ nghĩa là:', options: ['Sự quản lí, điều hành của nhà nước.', 'Ý chí, quyết tâm của nhân dân Việt Nam.', 'Đảng Cộng sản Việt Nam lãnh đạo.', 'Sự giúp đỡ của nhân dân yêu chuộng hòa bình trên thế giới.'], correct: 2 },
        { id: 59, text: 'Một trong những biện pháp khi tiến hành chiến tranh nhân dân, toàn dân đánh giặc theo quan điểm của Đảng là:', options: ['Tăng cường giáo dục quốc phòng, an ninh cho lực lượng vũ trang nhân dân.', 'Tăng cường giáo dục quốc phòng, an ninh cho mọi tầng lớp nhân dân nhất là thế hệ trẻ.', 'Tăng cường giáo dục quốc phòng, an ninh cho học sinh, sinh viên.', 'Tăng cường giáo dục quốc phòng, an ninh cho thế hệ trẻ.'], correct: 1 },
        { id: 60, text: 'Tiến hành chiến tranh nhân dân bảo vệ Tổ quốc, lấy đấu tranh quân sự là chủ yếu, lấy … là yếu tố quyết định.', options: ['Thắng lợi trên nghị trường.', 'Thắng lợi trên chiến trường.', 'Thắng lợi trên mặt trận kinh tế.', 'Phương án a, b, c đúng.'], correct: 1 },
        { id: 61, text: 'Khi tiến hành chiến tranh nhân dân cần kết hợp tác chiến của:', options: ['Quân đội nhân dân với công an nhân dân.', 'Bộ đội chủ lực với bộ đội địa phương.', 'Lực lượng vũ trang địa phương với các binh đoàn chủ lực.', 'Bộ đội chủ lực với bộ đội biên phòng.'], correct: 2 },
        { id: 62, text: 'Mục đích của chiến tranh nhân dân là:', options: ['Làm thất bại chiến lược “Diễn biến hòa bình” của các thế lực thù địch.', 'Sử dụng tiềm lực của đất nước, nhất là tiềm lực quốc phòng, an ninh nhằm đánh bại ý đồ xâm lược của kẻ thù.', 'Làm thất bại âm mưu, thủ đoạn bạo loạn lật đổ của các thế lực thù địch.', 'Phương án a, b, c đúng.'], correct: 3 },
        { id: 63, text: 'Chiến tranh nhân dân bảo vệ Tổ quốc Việt Nam xã hội chủ nghĩa là cuộc chiến tranh toàn dân, toàn diện. Trong đó lực lượng nào làm nòng cốt?', options: ['Lực lượng quân đội và công an.', 'Lực lượng quân đội.', 'Lực lượng vũ trang ba thứ quân.', 'Lực lượng vũ trang địa phương.'], correct: 2 },
        { id: 64, text: 'Chiến tranh nhân dân bảo vệ Tổ quốc Việt Nam XHCN là cuộc chiến tranh hiện đại về vũ khí, trang bị, tri thức và nghệ thuật quân sự. Được hiểu là:', options: ['Điểm mạnh của chiến tranh.', 'Đặc điểm của chiến tranh.', 'Tính chất của chiến tranh.', 'Quan điểm của chiến tranh.'], correct: 2 },
        { id: 65, text: 'Quan điểm của Đảng về chiến tranh nhân dân: phải kết hợp chặt chẽ giữa các mặt trận chính trị, văn hóa tư tưởng, ngoại giao nhằm tạo điều kiện cho:', options: ['Đấu tranh nghị trường giành thắng lợi.', 'Đấu tranh binh vận giành thắng lợi.', 'Đấu tranh địch vận giành thắng lợi.', 'Đấu tranh quân sự giành thắng lợi.'], correct: 3 },
        { id: 66, text: '“Trong chiến tranh mạnh được yếu thua, sĩ quan quân đội Mỹ được đào tạo đầy đủ bài bản hơn sĩ quan quân đội Việt Nam. Nhưng trong thế trận, không phải học nhiều hay vũ khí nhiều hiện đại mà giành thắng lợi, mà trong thế trận ai xử trí nhanh hơn người đó sẽ giành chiến thắng”. Câu nói trên là của ai?', options: ['Đại tướng Phạm Văn Trà.', 'Đại tướng Võ Nguyên Giáp.', 'Thượng tướng Hoàng Minh Thảo.', 'Đại tướng Nguyễn Chí Thanh.'], correct: 0 },
        { id: 67, text: 'Chọn câu trả lời sai. Tính chất xã hội của các cuộc chiến tranh?', options: ['Chính nghĩa và phi nghĩa.', 'Thế giới và cục bộ.', 'Cách mạng và phản cách mạng.', 'Tiến bộ và phản động.'], correct: 1 },
        { id: 68, text: 'Cuộc chiến tranh nào dưới đây được xác định là chiến tranh giải phóng dân tộc Việt Nam?', options: ['Kháng chiến chống Pháp.', 'Kháng chiến chống Mĩ.', 'Chiến tranh biên giới.', 'Phương án a và b đúng.'], correct: 3 },
        { id: 69, text: '“Cuộc chiến tranh do thực dân Pháp tiến hành ở nước ta là cuộc chiến tranh xâm lược, ngược lại cuộc chiến tranh của ta chống thực dân pháp là cuộc chiến tranh bảo vệ độc lập chủ quyền và thống nhất đất nước”. Ai khẳng định?', options: ['Chủ tịch Tôn Đức Thắng.', 'Chủ tịch Hồ Chí Minh.', 'Thủ tướng Phạm Văn Đồng.', 'Tổng bí thư Lê Duẫn.'], correct: 1 },
        { id: 70, text: '“Mỹ đánh Việt Nam mà không hiểu Việt Nam, không hiểu lịch sử, địa lý, văn hóa, phong tục, con người dân tộc nói chung cũng như những người lãnh đạo Việt Nam nói riêng. Chúng tôi có một nền văn hóa bền vững, một học thuyết quân sự độc đáo, mưu trí sáng tạo được thử thách trong lịch sử…” Ai khẳng định?', options: ['Đại tướng Võ Nguyên Giáp.', 'Chủ tịch Hồ Chí Minh.', 'Đại tướng Văn Tiến Dũng.', 'Đại tướng Nguyễn Chí Thanh.'], correct: 0 },
        { id: 71, text: 'Bản chất của chiến tranh?', options: ['Là sự kế tục của chính trị bằng thủ đoạn bạo lực.', 'Là thủ đoạn của kinh tế, chính trị xã hội.', 'Là quy luật của xã hội loài người.', 'Là bản chất của xã hội loài người.'], correct: 0 },
        { id: 72, text: 'Tiến hành chiến tranh nhân dân, toàn dân đánh giặc lấy lực lượng vũ trang nhân dân làm nòng cốt. Được xác định là:', options: ['Mục đích.', 'Quan điểm.', 'Tính chất.', 'Biện pháp.'], correct: 1 },
        { id: 73, text: 'Vì sao phải tiến hành chiến tranh nhân dân?', options: ['Xuất phát từ đường lối quân sự của Đảng.', 'Xuất phát từ tính chất, đặc điểm của cuộc chiến tranh.', 'Tiến hành cuộc chiến tranh nhân dân là sự kế thừa, phát huy nghệ thuật quân sự truyền thống của dân tộc.', 'Phương án a, b đúng.'], correct: 3 },
        { id: 74, text: 'Lực lượng nòng cốt của chiến tranh nhân dân?', options: ['Lực lượng vũ trang nhân dân.', 'Bộ đội chủ lực.', 'Hải quân, cảnh sát biển.', 'Bộ đội địa phương.'], correct: 0 },
        { id: 75, text: 'Tiêu chí để phân biệt tính chất chiến tranh chính nghĩa và phi nghĩa?', options: ['Mục đích của cuộc chiến tranh.', 'Chủng loại vũ khí dùng trong chiến tranh.', 'Hoàn cảnh tiến hành chiến tranh.', 'Phương án a, b đúng.'], correct: 0 },

        // ---- Xây dựng LLVT nhân dân ----
        { id: 76, text: 'Lực lượng vũ trang nhân dân Việt Nam do tổ chức nào lãnh đạo?', options: ['Đảng Cộng sản Việt Nam.', 'Quốc hội.', 'Chính phủ.', 'Mặt trận Tổ quốc.'], correct: 0 },
        { id: 77, text: 'Chiến đấu giành và giữ độc lập, chủ quyền thống nhất và toàn vẹn lãnh thổ của Tổ quốc. Được xác định là một trong những:', options: ['Nhiệm vụ của lực lượng vũ trang nhân dân Việt Nam.', 'Đặc điểm của lực lượng vũ trang nhân dân Việt Nam.', 'Nội dung của lực lượng vũ trang nhân dân Việt Nam.', 'Tính chất của lực lượng vũ trang nhân dân Việt Nam.'], correct: 0 },
        { id: 78, text: 'Xây dựng bản chất giai cấp công nhân cho quân đội, công an, làm cho lực lượng này tuyệt đối trung thành với Đảng với Tổ quốc với nhân dân. Được xác định là một trong những:', options: ['Nội dung xây dựng quân đội, công an cách mạng.', 'Nội dung xây dựng quân đội, công an chính quy.', 'Nội dung xây dựng quân đội, công an tinh nhuệ.', 'Nội dung xây dựng quân đội, công an hiện đại.'], correct: 0 },
        { id: 79, text: 'Nhà nước xây dựng Quân đội nhân dân cách mạng, chính quy, tinh nhuệ, từng bước hiện đại, có lực lượng thường trực hợp lý, lực lượng dự bị động viên hùng hậu; một số lực lượng tiến thẳng lên hiện đại. Được quy định tại:', options: ['Khoản 3, Điều 26, Luật quốc phòng 2018.', 'Khoản 3, Điều 24, Luật quốc phòng 2018.', 'Khoản 3, Điều 25, Luật quốc phòng 2018.', 'Khoản 3, Điều 27, Luật quốc phòng 2018.'], correct: 2 },
        { id: 80, text: 'Xây dựng Quân đội nhân dân, công an nhân dân cách mạng, chính quy, tinh nhuệ, từng bước hiện đại; một số quân chủng, binh chủng, lực lượng tiến thẳng lên hiện đại. Đến năm 2025, cơ bản xây dựng quân đội, công an tinh, gọn, mạnh. Đến năm 2030 xây dựng một số quân chủng, binh chủng, lực lượng hiện đại; vững mạnh về chính trị, tư tưởng, đạo đức, tổ chức và cán bộ. Được xác định trong:', options: ['Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ X.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XI.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XII.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XIII.'], correct: 3 },
        { id: 81, text: 'Nhà nước xây dựng Công an nhân dân cách mạng, chính quy, tinh nhuệ, từng bước hiện đại; ưu tiên hiện đại hóa một số lực lượng. Được quy định tại:', options: ['Khoản 3, Điều 26, Luật quốc phòng 2018.', 'Khoản 3, Điều 24, Luật quốc phòng 2018.', 'Khoản 3, Điều 25, Luật quốc phòng 2018.', 'Khoản 3, Điều 27, Luật quốc phòng 2018.'], correct: 0 },
        { id: 82, text: 'Đảng lãnh đạo lực lượng vũ trang nhân dân Việt Nam theo nguyên tắc?', options: ['Tuyệt đối, toàn diện.', 'Tuyệt đối và trực tiếp.', 'Tuyệt đối, trực tiếp về mọi mặt.', 'Trực tiếp về mọi mặt.'], correct: 2 },
        { id: 83, text: 'Đội quân chiến đấu, đội quân công tác, đội quân sản xuất. Được xác định là:', options: ['Biện pháp xây dựng quân đội theo tư tưởng Hồ Chí Minh.', 'Nhiệm vụ của quân đội theo tư tưởng Hồ Chí Minh.', 'Chức năng của quân đội theo tư tưởng Hồ Chí Minh.', 'Nguyên tắc xây dựng quân đội theo tư tưởng Hồ Chí Minh.'], correct: 2 },
        { id: 84, text: 'Một trong những quan điểm, nguyên tắc của Đảng về xây dựng lực lượng vũ trang nhân dân Việt Nam là:', options: ['Lấy chất lượng là chính, lấy xây dựng chính trị làm cơ sở.', 'Lấy số lượng là chính, lấy xây dựng kinh tế làm cơ sở.', 'Lấy chất lượng là chính, lấy xây dựng quân sự làm cơ sở.', 'Lấy số lượng là chính, lấy xây dựng quân sự làm cơ sở.'], correct: 0 },
        { id: 85, text: 'Phương hướng cơ bản xây dựng quân đội nhân dân, công an nhân dân đến năm 2025:', options: ['Nhanh, hiện đại, chính xác.', 'Cơ số lượng đông, sức cơ động nhanh.', 'Bảo đảm số lượng đông.', 'Tinh, gọn, mạnh.'], correct: 3 },
        { id: 86, text: 'Cả nước đang thực hiện hai nhiệm vụ chiến lược xây dựng và bảo vệ Tổ quốc xã hội chủ nghĩa, trong khi chủ nghĩa đế quốc và các thế lực thù địch chống phá ta quyết liệt. Được xác định là một trong những:', options: ['Đặc điểm liên quan đến xây dựng lực lượng vũ trang nhân dân.', 'Nội dung liên quan đến xây dựng lực lượng vũ trang nhân dân.', 'Biện pháp liên quan đến xây dựng lực lượng vũ trang nhân dân.', 'Tính chất liên quan đến xây dựng lực lượng vũ trang nhân dân.'], correct: 0 },
        { id: 87, text: 'Xây dựng lực lượng vũ trang nhân dân trong điều kiện quốc tế đã thay đổi, có nhiều diễn biến phức tạp. Được xác định là một trong những:', options: ['Đặc điểm liên quan đến xây dựng lực lượng vũ trang nhân dân.', 'Nội dung liên quan đến xây dựng lực lượng vũ trang nhân dân.', 'Biện pháp liên quan đến xây dựng lực lượng vũ trang nhân dân.', 'Tính chất liên quan đến xây dựng lực lượng vũ trang nhân dân.'], correct: 0 },
        { id: 88, text: 'Thành phần của lực lượng vũ trang nhân dân Việt Nam gồm:', options: ['Quân đội nhân dân, Công an nhân dân và Dân quân tự vệ.', 'Quân đội nhân dân, Công an nhân dân và Hội cựu Chiến binh.', 'Quân đội nhân dân, Công an nhân dân và Đoàn thanh niên.', 'Quân đội nhân dân, Công an nhân dân và Thanh niên xung kích.'], correct: 0 },
        { id: 89, text: '“Quân đội nhân dân có chức năng, nhiệm vụ sẵn sàng chiến đấu, chiến đấu bảo vệ Tổ quốc; thực hiện công tác vận động, tuyên truyền chủ trương, đường lối của Đảng, chính sách, pháp luật của Nhà nước; lao động sản xuất, kết hợp quốc phòng với kinh tế - xã hội, tham gia phòng thủ dân sự, cùng toàn dân xây dựng đất nước; thực hiện nghĩa vụ quốc tế”. Được quy định tại:', options: ['Khoản 2, Điều 23, Luật quốc phòng năm 2018.', 'Khoản 2, Điều 25, Luật quốc phòng năm 2018.', 'Khoản 2, Điều 24, Luật quốc phòng năm 2018.', 'Khoản 2, Điều 26, Luật quốc phòng năm 2018.'], correct: 1 },
        { id: 90, text: 'Quân đội nhân dân Việt Nam gồm có mấy Quân khu, Quân đoàn?', options: ['05 Quân khu, 02 Quân đoàn.', '06 Quân khu, 03 Quân đoàn.', '07 Quân khu, 04 Quân đoàn.', '08 Quân khu, 05 Quân đoàn.'], correct: 2 },
        { id: 91, text: 'Tổ chức các đơn vị phải gọn, mạnh, cơ động phù hợp với tình hình cụ thể ở từng địa phương, khu vực và thế trận cả nước. Được xác định là một trong những:', options: ['Biện pháp xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Nội dung xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Đặc điểm xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Tính chất xây dựng lực lượng vũ trang nhân dân Việt Nam.'], correct: 0 },
        { id: 92, text: 'Quân đội nhân dân Việt Nam hiện nay có mấy Quân chủng, Binh chủng?', options: ['05 Quân chủng, 02 Binh chủng.', '02 Quân chủng, 05 Binh chủng.', '03 Quân chủng, 06 Binh chủng.', '06 Quân chủng, 03 Binh chủng.'], correct: 2 },
        { id: 93, text: 'Giữ vững và tăng cường sự lãnh đạo của Đảng Cộng sản Việt Nam đối với lực lượng vũ trang nhân dân Việt Nam. Được xác định là một trong những:', options: ['Biện pháp xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Nội dung, nhiệm vụ xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Quan điểm, nguyên tắc xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Phương hướng xây dựng lực lượng vũ trang nhân dân Việt Nam.'], correct: 2 },
        { id: 94, text: 'Tự lực, tự cường, xây dựng lực lượng vũ trang nhân dân. Được xác định là một trong những:', options: ['Biện pháp xây dựng lực lượng vũ trang nhân dân.', 'Nhiệm vụ xây dựng lực lượng vũ trang nhân dân.', 'Quan điểm, nguyên tắc xây dựng lực lượng vũ trang nhân dân.', 'Phương hướng xây dựng lực lượng vũ trang nhân dân.'], correct: 2 },
        { id: 95, text: 'Bảo đảm lực lượng vũ trang nhân dân luôn trong tư thế sẵn sàng chiến đấu và chiến đấu thắng lợi. Được xác định là một trong những:', options: ['Biện pháp xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Nhiệm vụ xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Quan điểm, nguyên tắc xây dựng lực lượng vũ trang nhân dân Việt Nam.', 'Phương hướng xây dựng lực lượng vũ trang nhân dân Việt Nam.'], correct: 2 },
        { id: 96, text: 'Một trong những quan điểm, nguyên tắc cơ bản trong xây dựng lực lượng vũ trang nhân dân Việt Nam hiện nay?', options: ['Lấy khoa học là chính, lấy xây dựng về kinh tế làm cơ sở.', 'Lấy vũ khí trang bị là chính, lấy xây dựng về văn hóa làm cơ sở.', 'Lấy chất lượng là chính, lấy xây dựng về chính trị làm cơ sở.', 'Lấy số lượng là chính, lấy xây dựng về khoa học làm cơ sở.'], correct: 2 },
        { id: 97, text: 'Đứng trước diễn biến của tình hình chính trị, xã hội của đất nước, khu vực và thế giới, có khả năng phân tích và kết luận chính xác đúng, sai từ đó có thái độ đúng đắn với sự việc đó. Được xác định là nội dung:', options: ['Tinh nhuệ về kỹ thuật của lực lượng vũ trang nhân dân.', 'Tinh nhuệ về chính trị của lực lượng vũ trang nhân dân.', 'Tinh nhuệ về chiến thuật của lực lượng vũ trang nhân dân.', 'Tinh nhuệ về quân sự của lực lượng vũ trang nhân dân.'], correct: 1 },
        { id: 98, text: '“Chính trị trọng hơn quân sự” được Chủ tịch Hồ Chí Minh viết trong chỉ thị?', options: ['Thành lập lực lượng dân quân, tự vệ.', 'Thành lập lực lượng vũ trang địa phương.', 'Thành lập đội Việt Nam tuyên truyền giải phóng quân.', 'Thành lập lực lượng vũ trang ba thứ quân.'], correct: 2 },
        { id: 99, text: 'Xây dựng quân đội về chính trị trong đó vấn đề nào là cốt lõi nhất?', options: ['Bản chất giai cấp công nhân.', 'Tính quốc tế.', 'Tính dân tộc.', 'Tính tôn giáo.'], correct: 0 },
        { id: 100, text: 'Đội Việt Nam tuyên truyền giải phóng quân được thành lập ban đầu với bao nhiêu chiến sỹ, ai làm đội trưởng?', options: ['34 chiến sỹ, Võ Nguyên Giáp.', '34 chiến sỹ, Hoàng Sâm.', '34 chiến sỹ, Xích Thắng.', '34 chiến sỹ, Hoàng Văn Thái.'], correct: 1 },
        { id: 101, text: 'Ngày 22 tháng 12 hằng năm là ngày truyền thống của lực lượng:', options: ['Quân đội nhân dân.', 'Công an nhân dân.', 'Dân quân tự vệ.', 'Dự bị động viên.'], correct: 0 },
        { id: 102, text: 'Theo tư tưởng Hồ Chí Minh: Quân đội ta có sức mạnh vô địch vì:', options: ['Có Đảng xây dựng, Đảng lãnh đạo và giáo dục.', 'Được trải nghiệm và trưởng thành trong chiến đấu.', 'Có nhà nước xây dựng quản lí điều hành.', 'Được kế thừa truyền thống dựng và giữ nước của dân tộc.'], correct: 0 },

        // ---- Kết hợp phát triển kinh tế với quốc phòng ----
        { id: 103, text: 'Trong mối quan hệ giữa kinh tế và quốc phòng thì yếu tố ... suy đến cùng quyết định đến quốc phòng và an ninh.', options: ['Kinh tế.', 'Văn hóa.', 'Khoa học.', 'Ngoại giao.'], correct: 0 },
        { id: 104, text: 'Kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường củng cố quốc phòng và an ninh được xác định là quy luật của:', options: ['Chế độ xã hội chủ nghĩa.', 'Mọi quốc gia có chủ quyền.', 'Mọi quốc gia dân tộc có độc lập chủ quyền.', 'Chế độ tư bản chủ nghĩa.'], correct: 2 },
        { id: 105, text: 'Kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường củng cố quốc phòng và an ninh trên từng vùng lãnh thổ, trên các địa bàn chiến lược, biên giới, biển, đảo, khu kinh tế, khu công nghiệp trọng điểm. Được xác định trong:', options: ['Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ X.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XI.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XII.', 'Văn kiện Đại hội đại biểu Đảng toàn quốc lần thứ XIII.'], correct: 3 },
        { id: 106, text: 'Để thực hiện thắng lợi hai nhiệm vụ chiến lược của cách mạng Việt Nam, chúng ta phải kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường củng cố quốc phòng và an ninh trong một ...', options: ['Chủ trương thống nhất.', 'Quy hoạch thống nhất.', 'Kế hoạch thống nhất.', 'Chỉnh thể thống nhất.'], correct: 3 },
        { id: 107, text: 'Trong kháng chiến chống thực dân Pháp, để thực hiện tốt sự kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường củng cố quốc phòng và an ninh. Đảng ta đã đề ra một trong những chủ trương là:', options: ['Vừa kháng chiến, vừa kiến quốc.', 'Vừa đánh, vừa đàm.', 'Thóc không thiếu một cân, quân không thiếu một người.', 'Tất cả cho tiền tuyến.'], correct: 0 },
        { id: 108, text: 'Xây dựng chiến lược tổng thể kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường củng cố quốc phòng và an ninh trong thời kì mới. Được xác định là một trong những:', options: ['Cơ sở lí luận.', 'Nội dung.', 'Giải pháp.', 'Cơ sở thực tiễn.'], correct: 2 },
        { id: 109, text: 'Kinh tế và quốc phòng có mối quan hệ chặt chẽ và tác động qua lại lẫn nhau, trong đó lĩnh vực nào sau đây giữ vai trò quyết định?', options: ['Kinh tế.', 'Chính trị.', 'Văn hóa.', 'Quốc phòng.'], correct: 0 },
        { id: 110, text: 'Một trong những giải pháp chủ yếu thực hiện kết hợp phát triển kinh tế, văn hóa, xã hội với quốc phòng và an ninh là:', options: ['Kết hợp trong chiến lược bảo vệ Tổ quốc.', 'Kết hợp trong các ngành lĩnh vực chủ yếu.', 'Kết hợp trong giao thông vận tải, bưu điện, y tế, khoa học, giáo dục và xây dựng cơ bản.', 'Xây dựng chiến lược tổng thể kết hợp phát triển kinh tế, văn hóa, xã hội với quốc phòng và an ninh trong thời kỳ mới.'], correct: 3 },
        { id: 111, text: 'Trong xây dựng các công trình quốc phòng, quân sự, phòng thủ dân sự, thiết bị chiến trường phải bảo đảm tính:', options: ['Cạnh tranh.', 'Thị trường.', 'Lưỡng dụng.', 'Thẩm mỹ.'], correct: 2 },
        { id: 112, text: 'Tăng cường sự lãnh đạo của Đảng và hiệu lực quản lý nhà nước của chính quyền các cấp trong thực hiện kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường củng cố quốc phòng và an ninh. Được xác định là một trong những:', options: ['Cơ sở lý luận.', 'Nội dung.', 'Giải pháp.', 'Cơ sở thực tiễn.'], correct: 2 },
        { id: 113, text: 'Nơi có mật độ dân cư và tính chất đô thị hóa cao, gắn liền với các khu công nghiệp lớn, đặc khu kinh tế, các liên doanh có vốn đầu tư nước ngoài ... Được xác định là một trong những:', options: ['Đặc điểm về khoa học công nghệ của vùng kinh tế biển đảo.', 'Đặc điểm về an ninh của vùng kinh tế biên giới.', 'Đặc điểm về quốc phòng của vùng kinh tế vùng núi.', 'Đặc điểm về kinh tế của vùng kinh tế trọng điểm.'], correct: 3 },
        { id: 114, text: 'Là địa bàn sinh sống chủ yếu của đồng bào dân tộc ít người, mật độ dân số thấp, kinh tế chậm phát triển, trình độ dân trí thấp, đời sống dân cư còn nhiều khó khăn. Được xác định là một trong những:', options: ['Đặc điểm của đồng bằng sông Cửu Long.', 'Đặc điểm của các vùng miền.', 'Đặc điểm của các dân tộc thiểu số.', 'Đặc điểm của vùng núi, biên giới.'], correct: 3 },
        { id: 115, text: 'Bồi dưỡng, nâng cao kiến thức, kinh nghiệm kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường củng cố quốc phòng và an ninh cho các đối tượng. Được xác định là một trong những:', options: ['Cơ sở lí luận.', 'Nội dung.', 'Giải pháp.', 'Cơ sở thực tiễn.'], correct: 2 },
        { id: 116, text: 'Gắn phát triển nông nghiệp với việc giải quyết tốt các vấn đề xã hội, xây dựng nông thôn mới bảo đảm an ninh lương thực và an ninh nông thôn, góp phần tạo thế trận phòng thủ, …', options: ['“thế trận biển, đảo” vững chắc.', '“thế trận lòng dân” vững chắc.', '“thế trận an ninh nhân dân” vững chắc.', '“thế trận quốc phòng” vững chắc.'], correct: 1 },
        { id: 117, text: 'Thực chất kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường quốc phòng và an ninh nhằm:', options: ['Đẩy mạnh, thu hút nguồn vốn đầu tư từ nước ngoài.', 'Tạo điều kiện thuận lợi cho doanh nghiệp nước ngoài đầu tư kinh tế.', 'Xây dựng vùng kinh tế biên giới, biển, đảo của đất nước.', 'Thực hiện thắng lợi hai nhiệm vụ chiến lược xây dựng và bảo vệ Tổ quốc.'], correct: 3 },
        { id: 118, text: 'Đâu là một trong những nội dung của kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường quốc phòng và an ninh?', options: ['Kết hợp trong xác định chiến lược phát triển kinh tế, văn hóa, xã hội.', 'Xây dựng chiến lược tổng thể kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường quốc phòng và an ninh trong thời kỳ mới.', 'Tăng cường sự lãnh đạo của Đảng và hiệu lực quản lý Nhà nước của chính quyền các cấp.', 'Bồi dưỡng nâng cao kiến thức, kinh nghiệm kết hợp phát triển kinh tế, văn hóa, xã hội với tăng cường quốc phòng và an ninh cho các đối tượng.'], correct: 0 },
        { id: 119, text: 'Lợi ích kinh tế, suy đến cùng là nguyên nhân làm nảy sinh các mâu thuẫn và xung đột xã hội. Để giải quyết mâu thuẫn đó, phải có hoạt động quốc phòng và an ninh. Được xác định là một trong những nội dung:', options: ['Cơ sở lý luận của sự kết hợp.', 'Cơ sở thực tiễn của sự kết hợp.', 'Đặc điểm của sự kết hợp.', 'Giải pháp của sự kết hợp.'], correct: 0 },
        { id: 120, text: 'Thực hiện kết hợp kinh tế với quốc phòng, ông cha ta luôn chăm lo mở mang đường sá, đào sông ngòi, kênh rạch, xây đắp đê điều để vừa phát triển kinh tế, vừa tạo lập thế trận đánh giặc trong chiến tranh. Được xác định là một trong những:', options: ['Cơ sở lý luận của sự kết hợp.', 'Cơ sở thực tiễn của sự kết hợp.', 'Nội dung chính của sự kết hợp.', 'Biện pháp chính của sự kết hợp.'], correct: 1 },
        { id: 121, text: 'Thực hiện tốt nguyên tắc bình đẳng, cùng có lợi, tôn trọng độc lập, chủ quyền và không can thiệp vào công việc nội bộ của nhau; giữ gìn bản sắc văn hóa dân tộc; giải quyết các tranh chấp bằng thương lượng hòa bình. Được xác định là một trong những nội dung:', options: ['Kết hợp kinh tế với quốc phòng trong hoạt động đối ngoại.', 'Kết hợp kinh tế với quốc phòng trong thực hiện chiến lược bảo vệ Tổ quốc.', 'Kết hợp kinh tế với quốc phòng trong các ngành, các lĩnh vực kinh tế chủ yếu.', 'Kết hợp kinh tế với quốc phòng trong chiến lược phát triển kinh tế, văn hóa, xã hội.'], correct: 0 },
        { id: 122, text: '“Thời bình, phải khoan thư sức dân làm kế sâu rễ bền gốc. Đó là thượng sách giữ nước”. Đây là câu nói của ai?', options: ['Trần Thủ Độ.', 'Trần Quốc Tuấn.', 'Trần Nhân Tông.', 'Trần Anh Tông.'], correct: 1 },
        { id: 123, text: 'Kế sách “ngụ binh ư nông”. Được thực hiện đầu tiên ở nước ta vào triều đại nào?', options: ['Nhà Đinh.', 'Nhà Tiền Lê.', 'Nhà Lý.', 'Nhà Hậu Lê.'], correct: 2 },
        { id: 124, text: 'Quyết định đến việc cung cấp số lượng, chất lượng nguồn nhân lực cho quốc phòng và an ninh; quyết định đến tổ chức, biên chế của lực lượng vũ trang; quyết định đến đường lối chiến lược quốc phòng. Yếu tố nào sau đây quyết định:', options: ['Kinh tế.', 'Chính trị.', 'Văn hóa.', 'Khoa học.'], correct: 0 },
        { id: 125, text: '“Dựng nước đi đôi với giữ nước” có ý nghĩa gì đối với nước ta:', options: ['Là quy luật tồn tại và phát triển của dân tộc.', 'Là góp phần giữ gìn hòa bình cho khu vực.', 'Là góp phần giữ gìn hòa bình trên thế giới.', 'Là góp phần giữ vững ổn định cho khu vực và trên thế giới.'], correct: 0 },

        // ---- Nghệ thuật quân sự Việt Nam ----
        { id: 126, text: 'Cuộc khởi nghĩa Lam Sơn năm 1418 – 1427 do ai lãnh đạo?', options: ['Lê Lợi - Nguyễn Trãi.', 'Nguyễn Trãi - Trần Nguyên Hãn.', 'Quang Trung - Ngô Thì Nhậm.', 'Trần Quốc Tuấn - Trần Quang Khải.'], correct: 0 },
        { id: 127, text: 'Thời nhà Trần chống quân Nguyên - Mông lần thứ 2 diễn ra vào thời gian nào?', options: ['Năm 1258.', 'Năm 1285.', 'Năm 1287.', 'Năm 1288.'], correct: 1 },
        { id: 128, text: 'Cuộc kháng chiến chống quân Nguyên – Mông lần thứ ba do nhà Trần lãnh đạo, quân và dân ta đã đánh thắng:', options: ['03 vạn quân.', '50 vạn quân.', '60 vạn quân.', '29 vạn quân.'], correct: 1 },
        { id: 129, text: 'Mặt trận nào sau đây giữ vai trò quyết định đến thắng lợi trong chiến tranh?', options: ['Mặt trận ngoại giao.', 'Mặt trận kinh tế.', 'Mặt trận quân sự.', 'Mặt trận chính trị.'], correct: 2 },
        { id: 130, text: 'Trong lịch sử chống giặc ngoại xâm. Ai là người lãnh đạo quân dân ta đã giành thắng lợi đánh quân Nam Hán ở đâu, thời gian nào?', options: ['Lý Thường Kiệt. Sông Như Nguyệt. Năm 1077.', 'Ngô Quyền. Sông Bạch Đằng. Năm 938.', 'Lê Lợi - Nguyễn Trãi. Lũng Nhai. Năm 1418.', 'Quang Trung. Ngọc Hồi. Năm 1789.'], correct: 1 },
        { id: 131, text: 'Tổng thể phương châm, chính sách và mưu lược được hoạch định để ngăn ngừa và sẵn sàng tiến hành chiến tranh thắng lợi; bộ phận hợp thành có tác dụng chủ đạo trong nghệ thuật quân sự. Được xác định là.', options: ['Khái niệm nghệ thuật chiến dịch.', 'Khái niệm chiến lược quân sự.', 'Khái niệm nghệ thuật chiến thuật.', 'Khái niệm nghệ thuật quân sự.'], correct: 1 },
        { id: 132, text: 'Nghệ thuật quân sự Việt Nam có mấy bộ phận hợp thành?', options: ['03; Nghệ thuật chiến dịch, chiến thuật và tác chiến điện tử.', '02, Chiến lược quân sự, nghệ thuật chiến dịch.', '03, Chiến lược quân sự, nghệ thuật chiến dịch và chiến thuật.', '02, Nghệ thuật chiến thuật và cách đánh.'], correct: 2 },
        { id: 133, text: 'Trong nghệ thuật quân sự Việt Nam, bộ phận nào dưới đây giữ vai trò chủ đạo?', options: ['Chiến lược quân sự.', 'Nghệ thuật chiến dịch.', 'Nghệ thuật chiến thuật.', 'Phương thức tiến hành chiến tranh.'], correct: 0 },
        { id: 134, text: 'Người phất cờ khởi nghĩa tại núi Nưa - Triệu Sơn - Thanh Hóa, vào năm nào?', options: ['Triệu Thị Trinh, năm 248.', 'Trung Nữ Vương, năm 248.', 'Công chúa Ngọc Hân, năm 1770 - 1799.', 'Bùi Thị Xuân, năm 1802.'], correct: 0 },
        { id: 135, text: 'Trước đối tượng tác chiến là quân Nguyên - Mông có sức mạnh hơn ta nhiều lần, một trong những biện pháp bảo toàn lực lượng và tạo thế, thời cơ để phản công của quân đội nhà Trần là:', options: ['Rút lui vì giặc quá mạnh.', 'Rút lui vì giặc quá đông.', 'Chủ động rút lui chiến lược.', 'Chủ động tích cực tiến công.'], correct: 2 },
        { id: 136, text: 'Chiến dịch Điện Biên Phủ năm 1954, được xác định là loại hình chiến dịch gì?', options: ['Tiến công.', 'Phòng ngự.', 'Phản công.', 'Tập kích.'], correct: 0 },
        { id: 137, text: 'Để đánh thắng 29 vạn quân xâm lược Mãn Thanh và 2 vạn quân bán nước Lê Chiêu Thống. Quang Trung đã dùng lối đánh:', options: ['Đánh chắc, tiến chắc, bất ngờ.', 'Đánh nhanh sục sâu kỹ vừa đánh vừa địch vận.', 'Táo bạo, thần tốc, bất ngờ.', 'Bí mật, tinh khôn, mưu mẹo.'], correct: 2 },
        { id: 138, text: '“Đánh cho để dài tóc, đánh cho để đen răng, đánh cho nó trích luân bất phản, đánh cho nó phiến giáp bất hoàn, đánh cho sử tri Nam quốc anh hùng chi hữu chủ”. Câu nói trên của ai?', options: ['Quang Trung.', 'Lê Lợi.', 'Trần Quốc Tuấn.', 'Lý Thường Kiệt.'], correct: 0 },
        { id: 139, text: 'Muốn kết thúc chiến tranh phải chọn:', options: ['Vào thời điểm chúng ta có đủ thế và lực.', 'Vào thời điểm chúng ta chưa được quốc tế ủng hộ.', 'Vào thời điểm chúng ta chưa xây dựng được thế trận.', 'Vào thời điểm chúng ta chưa đáp ứng được điều kiện lịch sử.'], correct: 0 },
        { id: 140, text: 'Quân Tây Sơn tiêu diệt 5 vạn quân Xiêm tại đâu? Vào thời gian nào?', options: ['Rạch Gầm - Xoài Mút, năm 1782 – 1783.', 'Rạch Gầm - Xoài Mút, năm 1783 – 1784.', 'Rạch Gầm - Xoài Mút, năm 1784 – 1785.', 'Rạch Gầm - Xoài Mút, năm 1785 – 1786.'], correct: 2 },
        { id: 141, text: 'Để lừa địch, đánh vào chỗ yếu, chỗ sơ hở, chỗ ít phòng bị, làm cho chúng bị động, lúng túng đối phó. Được xác định là gì trong nghệ thuật đánh giặc của ông cha?', options: ['Mưu.', 'Kế.', 'Thế.', 'Thời.'], correct: 1 },
        { id: 142, text: 'Điều địch theo ý định của ta, giành quyền chủ động, buộc địch phải đánh theo cách đánh của ta. Được xác định là gì trong nghệ thuật đánh giặc của ông cha?', options: ['Kế sách.', 'Mưu cầu.', 'Thế trận.', 'Thời cơ.'], correct: 0 },
        { id: 143, text: 'Kết hợp chặt chẽ giữa tiến công quân sự với binh vận, ngoại giao, tạo thế mạnh cho ta, biết phá thế mạnh của giặc, trong đó:', options: ['Tiến công quân sự giữ vai trò quyết định.', 'Đấu tranh chính trị giữ vai trò quyết định.', 'Đấu tranh trên mặt trận ngoại giao giữ vai trò quyết định.', 'Mặt trận binh vận giữ vai trò quyết định.'], correct: 0 },
        { id: 144, text: 'Một trong những lý do chính mà nước ta thường xuyên bị kẻ thù nhòm ngó, đe dọa, tiến công xâm lược?', options: ['Việt Nam có vị trí địa lý chiến lược trọng yếu ở khu vực Đông Nam Á và Châu Á Thái Bình Dương.', 'Việt Nam có nhiều tài nguyên thiên nhiên và khoáng sản với trữ lượng lớn nhất ở khu vực Đông Nam Á và Châu Á Thái Bình Dương.', 'Việt Nam có địa hình hiểm trở.', 'Việt Nam có đồng bằng sông Cửu Long lớn thứ 2 trên thế giới.'], correct: 0 },
        { id: 145, text: 'Lý Thường Kiệt đã sử dụng biện pháp “Tiên phát chế nhân”, nghĩa là:', options: ['Chủ động tiến công trước, đẩy kẻ thù vào thế bị động.', 'Thực hiện đánh nhanh và thắng nhanh.', 'Nhanh chóng hoàn thành mục tiêu đặt ra.', 'Chủ động tiến công phá vỡ thế phòng thủ của giặc.'], correct: 0 },
        { id: 146, text: 'Một trong những nội dung nghệ thuật đánh giặc của ông cha ta là?', options: ['Lấy nhỏ đánh lớn, lấy ít địch nhiều, lấy yếu chống mạnh.', 'Thực hiện đánh nhanh, thắng nhanh sang đánh chắc, tiến chắc.', 'Đem đại nghĩa thắng hung tàn, lấy chí nhân thay cường bạo.', 'Thực hiện đánh chắc, tiến chắc sang đánh nhanh, tiến nhanh.'], correct: 0 },
        { id: 147, text: 'Một trong những nội dung nghệ thuật đánh giặc của ông cha ta là?', options: ['Kết hợp đấu tranh giữa các mặt trận quân sự, chính trị, ngoại giao, binh vận.', 'Kết hợp đấu tranh vũ trang với đấu tranh chính trị.', 'Kết hợp đấu tranh chống địch tiến công từ bên ngoài với đấu tranh chống bạo loạn lật đổ từ bên trong.', 'Kết hợp đấu tranh trên tất cả các lĩnh vực, trong đó lấy kinh tế làm yếu tố quyết định.'], correct: 0 },
        { id: 148, text: 'Một trong những cơ sở hình thành nghệ thuật quân sự Việt Nam từ khi có Đảng là?', options: ['Truyền thống đánh giặc của tổ tiên.', 'Chiến lược quân sự.', 'Nghệ thuật chiến dịch.', 'Nghệ thuật chiến thuật.'], correct: 0 },
        { id: 149, text: 'Một trong những nội dung chiến lược quân sự của Đảng ta là:', options: ['Xác định đúng kẻ thù, đúng đối tượng tác chiến.', 'Lấy nhỏ đánh lớn, lấy ít địch nhiều, lấy yếu chống mạnh.', 'Thực hiện phương châm đánh nhanh và thắng nhanh.', 'Kết hợp đấu tranh vũ trang với đấu tranh chính trị.'], correct: 0 },
        { id: 150, text: 'Sau thắng lợi của cách mạng tháng Tám năm 1945, trên lãnh thổ nước ta cùng một lúc xuất hiện nhiều kẻ thù. Chủ tịch Hồ Chí Minh và Đảng ta đã xác định đối tượng nào là kẻ thù nguy hiểm, trực tiếp của cách mạng Việt Nam?', options: ['Thực dân Pháp.', 'Phát xít Nhật Bản.', 'Quân Tưởng Giới Thạch.', 'Quân đội Anh.'], correct: 0 }
    ];

    // ===================== LOGIC HIỂN THỊ =====================
    const container = document.getElementById('questions-container');
    const progressEl = document.getElementById('progress');
    let selected = new Array(questionsData.length).fill(-1);
    let showAllCorrect = false;

    function render() {
        let html = '';
        let answeredCount = 0;
        questionsData.forEach((q, idx) => {
            const sel = selected[idx];
            const isAnswered = sel !== -1;
            if (isAnswered) answeredCount++;

            html += `<div class="question-block" data-idx="${idx}">`;
            html += `<div class="q-header"><span class="q-number">${idx+1}</span><span class="q-text">${q.text}</span></div>`;
            html += `<div class="options">`;
            q.options.forEach((opt, optIdx) => {
                let classes = 'option';
                const isSelected = (sel === optIdx);
                const isCorrect = (optIdx === q.correct);

                if (showAllCorrect) {
                    // Chế độ xem đáp án: tô xanh đáp án đúng, đỏ nếu đã chọn sai
                    if (isCorrect) classes += ' correct';
                    if (isSelected && !isCorrect) classes += ' wrong';
                } else {
                    if (isSelected) {
                        if (isCorrect) classes += ' correct';
                        else classes += ' wrong';
                    }
                }

                // Nếu đã chọn và không xem đáp án, vô hiệu hóa
                if (isAnswered && !showAllCorrect) classes += ' disabled';

                let label = String.fromCharCode(97 + optIdx);
                html += `<div class="${classes}" data-optidx="${optIdx}" onclick="handleSelect(${idx}, ${optIdx})">`;
                html += `<span class="label">${label}.</span>`;
                html += `<span class="text">${opt}</span>`;
                html += `</div>`;
            });
            html += `</div>`;

            // Badge kết quả
            if (isAnswered && !showAllCorrect) {
                const isCorrect = (sel === q.correct);
                const badgeClass = isCorrect ? 'correct' : 'wrong';
                const badgeText = isCorrect ? '✅ Đúng' : '❌ Sai';
                html += `<div class="result-badge ${badgeClass}">${badgeText}</div>`;
            }

            // Nếu sai, hiển thị đáp án đúng
            if (isAnswered && !showAllCorrect && sel !== q.correct) {
                html += `<div style="margin-top:6px; font-size:14px; color:#28a745; font-weight:500;">✔️ Đáp án đúng: ${String.fromCharCode(97 + q.correct)}. ${q.options[q.correct]}</div>`;
            }

            html += `</div>`;
        });

        container.innerHTML = html;
        progressEl.textContent = `Đã trả lời: ${answeredCount} / ${questionsData.length} câu`;

        if (showAllCorrect) {
            document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'none');
        } else {
            document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'auto');
        }
    }

    window.handleSelect = function(qIdx, optIdx) {
        if (selected[qIdx] !== -1 || showAllCorrect) return;
        selected[qIdx] = optIdx;
        render();
    };

    document.getElementById('showAllBtn').addEventListener('click', function() {
        showAllCorrect = !showAllCorrect;
        this.textContent = showAllCorrect ? '📌 Ẩn đáp án' : '📌 Hiển thị tất cả đáp án đúng';
        render();
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        selected.fill(-1);
        showAllCorrect = false;
        document.getElementById('showAllBtn').textContent = '📌 Hiển thị tất cả đáp án đúng';
        render();
    });

    render();
</script>
</body>
</html>
