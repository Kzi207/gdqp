<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập HP3M - Trắc nghiệm</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fc;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px 25px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #1a2b4a;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            color: #6b7a8f;
            margin-bottom: 30px;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 15px;
        }

        .question-block {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px 20px 20px 20px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .question-block:hover {
            border-color: #b0c4de;
        }

        .q-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 17px;
            color: #1e2f4e;
        }

        .q-number {
            background: #1a2b4a;
            color: #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .q-text {
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
            padding-left: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.15s ease;
            background: #fafcff;
        }

        .option:hover {
            background: #f0f5ff;
            border-color: #a0b8d4;
        }

        .option .label {
            font-weight: 600;
            color: #2c3e66;
            min-width: 24px;
        }

        .option .text {
            flex: 1;
        }

        /* Trạng thái */
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.correct .label {
            color: #155724;
        }

        .option.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.wrong .label {
            color: #721c24;
        }

        .option.disabled {
            cursor: default;
            opacity: 0.85;
        }

        .option.show-correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .result-badge {
            margin-top: 14px;
            font-weight: 500;
            font-size: 15px;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        .result-badge.correct {
            color: #155724;
            background: #d4edda;
        }

        .result-badge.wrong {
            color: #721c24;
            background: #f8d7da;
        }

        .btn-show-answers {
            display: block;
            margin: 25px auto 10px;
            padding: 12px 36px;
            background: #1a2b4a;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 8px rgba(26,43,74,0.25);
        }

        .btn-show-answers:hover {
            background: #2c3f66;
        }

        .btn-reset {
            display: inline-block;
            margin-left: 20px;
            padding: 10px 24px;
            background: #e2e8f0;
            color: #1a2b4a;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #cdd7e6;
        }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .progress {
            text-align: center;
            font-size: 16px;
            color: #4a5a72;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .option { font-size: 14px; padding: 8px 12px; }
            .q-header { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>📘 ÔN TẬP LÝ THUYẾT HP3M</h1>
        <div class="subtitle">Chế độ sinh hoạt · Quân binh chủng · Điều lệnh đội ngũ · Bản đồ · Vũ khí công nghệ cao</div>

        <div id="questions-container"></div>

        <div class="footer">
            <button class="btn-show-answers" id="showAllBtn">📌 Hiển thị tất cả đáp án đúng</button>
            <button class="btn-reset" id="resetBtn">🔄 Làm lại</button>
        </div>
        <div class="progress" id="progress"></div>
    </div>

            { id: 3, text: 'Theo khoản 1, điều 46 ĐLQLBĐ quy định thời gian học tập, sinh hoạt buổi tối:', options: ['Không quá 1 giờ', 'Không quá 2 giờ', 'Không quá 3 giờ', 'Không quá 4 giờ'], correct: 1 },

            { id: 92, text: 'Một trong những biện pháp chủ động phòng tránh là:', options: ['Gây nhiễu trang bị trinh sát của địch', 'Ngụy trang mục tiêu', 'Dụ địch đánh mục tiêu giả', 'Tăng cường phòng không'], correct: 0 },
            { id: 93, text: 'Một trong những biện pháp thụ động phòng tránh là:', options: ['Dụ địch đánh vào mục tiêu giá trị thấp, làm chúng tiêu hao', 'Gây nhiễu', 'Ngụy trang', 'Di chuyển'], correct: 0 }
        ];

        // ===================== LOGIC HIỂN THỊ =====================
        const container = document.getElementById('questions-container');
        const progressEl = document.getElementById('progress');
        let selected = new Array(questionsData.length).fill(-1);
        let showAllCorrect = false;

        function render() {
            let html = '';
            let answeredCount = 0;
            questionsData.forEach((q, idx) => {
                const sel = selected[idx];
                const isAnswered = sel !== -1;
                if (isAnswered) answeredCount++;

                html += `<div class="question-block" data-idx="${idx}">`;
                html += `<div class="q-header"><span class="q-number">${idx+1}</span><span class="q-text">${q.text}</span></div>`;
                html += `<div class="options">`;
                q.options.forEach((opt, optIdx) => {
                    let classes = 'option';
                    const isSelected = (sel === optIdx);
                    const isCorrect = (optIdx === q.correct);

                    if (showAllCorrect) {
                        if (isCorrect) classes += ' correct';
                        if (isSelected && !isCorrect) classes += ' wrong';
                        else if (isSelected && isCorrect) classes += ' correct';
                    } else {
                        if (isSelected) {
                            if (isCorrect) classes += ' correct';
                            else classes += ' wrong';
                        }
                    }

                    // Nếu đã chọn và không showAll, vô hiệu hóa tương tác
                    if (isAnswered && !showAllCorrect) classes += ' disabled';

                    let label = String.fromCharCode(97 + optIdx);
                    html += `<div class="${classes}" data-optidx="${optIdx}" onclick="handleSelect(${idx}, ${optIdx})">`;
                    html += `<span class="label">${label}.</span>`;
                    html += `<span class="text">${opt}</span>`;
                    html += `</div>`;
                });
                html += `</div>`;

                // Badge kết quả
                if (isAnswered && !showAllCorrect) {
                    const isCorrect = (sel === q.correct);
                    const badgeClass = isCorrect ? 'correct' : 'wrong';
                    const badgeText = isCorrect ? '✅ Đúng' : '❌ Sai';
                    html += `<div class="result-badge ${badgeClass}">${badgeText}</div>`;
                }

                // Nếu sai, hiển thị đáp án đúng
                if (isAnswered && !showAllCorrect && sel !== q.correct) {
                    html += `<div style="margin-top:6px; font-size:14px; color:#28a745; font-weight:500;">✔️ Đáp án đúng: ${String.fromCharCode(97 + q.correct)}. ${q.options[q.correct]}</div>`;
                }

                html += `</div>`;
            });

            container.innerHTML = html;
            progressEl.textContent = `Đã trả lời: ${answeredCount} / ${questionsData.length} câu`;

            // Nếu showAllCorrect, vô hiệu hóa click
            if (showAllCorrect) {
                document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'none');
            } else {
                document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'auto');
            }
        }

        window.handleSelect = function(qIdx, optIdx) {
            if (selected[qIdx] !== -1 || showAllCorrect) return;
            selected[qIdx] = optIdx;
            render();
        };

        document.getElementById('showAllBtn').addEventListener('click', function() {
            showAllCorrect = !showAllCorrect;
            if (showAllCorrect) {
                this.textContent = '📌 Ẩn đáp án';
            } else {
                this.textContent = '📌 Hiển thị tất cả đáp án đúng';
            }
            render();
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            selected.fill(-1);
            showAllCorrect = false;
            document.getElementById('showAllBtn').textContent = '📌 Hiển thị tất cả đáp án đúng';
            render();
        });

        render();
    </script>
