<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập HP4 - Trắc nghiệm</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fc;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px 25px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #1a2b4a;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            color: #6b7a8f;
            margin-bottom: 30px;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 15px;
        }

        .question-block {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px 20px 20px 20px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .question-block:hover {
            border-color: #b0c4de;
        }

        .q-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 17px;
            color: #1e2f4e;
        }

        .q-number {
            background: #1a2b4a;
            color: #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .q-text {
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
            padding-left: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.15s ease;
            background: #fafcff;
        }

        .option:hover {
            background: #f0f5ff;
            border-color: #a0b8d4;
        }

        .option .label {
            font-weight: 600;
            color: #2c3e66;
            min-width: 24px;
        }

        .option .text {
            flex: 1;
        }

        /* Trạng thái */
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.correct .label {
            color: #155724;
        }

        .option.wrong {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.wrong .label {
            color: #721c24;
        }

        .option.disabled {
            cursor: default;
            opacity: 0.85;
        }

        .option.show-correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .result-badge {
            margin-top: 14px;
            font-weight: 500;
            font-size: 15px;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        .result-badge.correct {
            color: #155724;
            background: #d4edda;
        }

        .result-badge.wrong {
            color: #721c24;
            background: #f8d7da;
        }

        .btn-show-answers {
            display: block;
            margin: 25px auto 10px;
            padding: 12px 36px;
            background: #1a2b4a;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 8px rgba(26,43,74,0.25);
        }

        .btn-show-answers:hover {
            background: #2c3f66;
        }

        .btn-reset {
            display: inline-block;
            margin-left: 20px;
            padding: 10px 24px;
            background: #e2e8f0;
            color: #1a2b4a;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #cdd7e6;
        }

        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .progress {
            text-align: center;
            font-size: 16px;
            color: #4a5a72;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .option { font-size: 14px; padding: 8px 12px; }
            .q-header { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>📘 ÔN TẬP LÝ THUYẾT HP4</h1>
        <div class="subtitle">Súng AK · Lựu đạn · Tiến công · Phòng ngự</div>

        <div id="questions-container"></div>

        <div class="footer">
            <button class="btn-show-answers" id="showAllBtn">📌 Hiển thị tất cả đáp án đúng</button>
            <button class="btn-reset" id="resetBtn">🔄 Làm lại</button>
        </div>
        <div class="progress" id="progress"></div>
    </div>

            { id: 47, text: 'Trường hợp vận dụng động tác bắn súng tiểu liên AK?', options: ['Khi địa hình có vật che khuất, che đỡ cao ngang tầm ngực, hoặc bắn trong công sự', 'Khi địa hình có vật che khuất, cao ngang tầm người ngồi, hoặc bắn trong công sự', 'Khi địa hình trống trải, không có vật che đỡ', 'Khi địa hình trống trải, không có vật che khuất'], correct: 0 },
            { id: 48, text: 'Khi ngắm chụm và trúng người tập phải ngắm vào bia đồng tiền đen di động mấy lần để đủ điều kiện đánh giá kết quả?', options: ['2 lần', '3 lần', '4 lần', '5 lần'], correct: 1 },
            { id: 49, text: 'Cách phân loại thành tích ngắm trúng, chụm đạt loại giỏi là:', options: ['Điểm ngắm trung bình cách điểm kiểm tra 5 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 10 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 15 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 240 mm trở lại'], correct: 0 },
            { id: 50, text: 'Cách phân loại thành tích ngắm trúng, chụm đạt loại khá là:', options: ['Điểm ngắm trung bình cách điểm kiểm tra 10 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 15 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 20 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 5 mm trở lại'], correct: 0 },
            { id: 51, text: 'Cách phân loại thành tích ngắm trúng, chụm đạt loại đạt là:', options: ['Điểm ngắm trung bình cách điểm kiểm tra 15 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 10 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 5 mm trở lại', 'Điểm ngắm trung bình cách điểm kiểm tra 20 mm trở lại'], correct: 0 },
            { id: 52, text: 'Tốc độ bắn chiến đấu của súng tiểu liên AK, khi bắn phát một là bao nhiêu phát/phút?', options: ['35 phát/phút', '40 phát/phút', '45 phát/phút', '50 phát/phút'], correct: 1 },
            { id: 53, text: 'Tốc độ bắn chiến đấu của súng tiểu liên AK, khi bắn liên thanh là bao nhiêu phát/phút?', options: ['150 phát/phút', '100 phát/phút', '120 phát/phút', '350 phát/phút'], correct: 1 },
            { id: 54, text: 'Tầm bắn thẳng của súng tiểu liên AK với mục tiêu người chạy cao 1,5 mét là bao nhiêu mét?', options: ['625 mét', '525 mét', '350 mét', '425 mét'], correct: 1 },
            { id: 55, text: 'Tốc độ đầu của đầu đạn súng tiểu liên AK là bao nhiêu mét/giây?', options: ['715 mét/giây', '710 mét/giây', '735 mét/giây', '815 mét/giây'], correct: 1 },
            { id: 56, text: 'Hộp tiếp đạn của súng tiểu liên AK chứa tối đa được bao nhiêu viên đạn?', options: ['40 viên', '30 viên', '1000 viên', '50 viên'], correct: 1 },
            { id: 57, text: 'Cấu tạo chính của một viên đạn súng tiểu liên AK có bao nhiêu bộ phận?', options: ['2 bộ phận', '4 bộ phận', '3 bộ phận', '5 bộ phận'], correct: 1 },
            { id: 58, text: 'Quốc gia nào nghiên cứu, chế tạo ra súng tiểu liên AK đầu tiên trên thế giới?', options: ['Mỹ', 'Liên Xô', 'Tiệp Khắc', 'Việt Nam'], correct: 1 },
            { id: 59, text: 'Tầm bắn tối đa được ghi trên thước ngắm của súng tiểu liên AK là bao nhiêu?', options: ['10', '8', '7', '9'], correct: 1 },
            { id: 60, text: 'Vạch chữ "P" trên thước ngắm của súng tiểu liên AK tương ứng với thước ngắm mấy?', options: ['4', '3', '2', '1'], correct: 3 },
            { id: 61, text: 'Là khoảng đầu đạn không sát thương được mục tiêu ở sau vật che đỡ. Được xác định là:', options: ['Khoảng che khuất', 'Khoảng an toàn', 'Khoảng che đỡ', 'Khoảng không an toàn'], correct: 0 },
            { id: 62, text: 'Tại sao đầu đạn lại tự xoay tròn quanh trục của nó khi chuyển động?', options: ['Do nòng súng có các rãnh xoắn', 'Do cấu tạo của đạn', 'Do thoi đẩy', 'Do góc nảy'], correct: 0 },

            // ---- LỰU ĐẠN ----
            { id: 63, text: 'Chuyển động nổ của lựu đạn F1 được tính từ:', options: ['Khi rút chốt an toàn và lựu đạn rời khỏi tay', 'Khi lựu đạn bay đến mục tiêu', 'Khi lấy lựu đạn ra khỏi túi đựng', 'Khi lựu đạn đã rút chốt an toàn'], correct: 0 },
            { id: 64, text: 'Khi ném, để lựu đạn bay được xa nhất thì thời cơ buông lựu đạn tốt nhất là:', options: ['Cánh tay hợp với mặt phẳng ngang một góc 45°', 'Cánh tay hợp với mặt phẳng ngang một góc 35°', 'Cánh tay hợp với mặt phẳng ngang một góc 25°', 'Cánh tay hợp với mặt phẳng ngang một góc 15°'], correct: 0 },
            { id: 65, text: 'Trong kỹ thuật sử dụng lựu đạn, thuật ngữ nào sau đây là đúng?', options: ['Ném lựu đạn', 'Ném lựu đạn', 'Ném lựu đạn', 'Ném lựu đạn'], correct: 0 }, // tạm
            { id: 66, text: 'Khi rút chốt an toàn, kim hỏa, lò xo kim hỏa bung ra, kim hỏa chọc vào hạt lửa, đốt cháy dây cháy chậm từ 3 – 4 giây thì lửa phụt vào kíp làm kíp nổ, gây nổ lựu đạn. Được xác định là:', options: ['Thứ tự các bộ phận của lựu đạn', 'Tính năng của lựu đạn', 'Chuyển động nổ của lựu đạn F1', 'Cách sử dụng lựu đạn'], correct: 2 },
            { id: 67, text: 'Theo kỹ thuật, chuyển động nổ của lựu đạn F1 được xác định từ khi:', options: ['Lựu đạn tới tay', 'Ném lựu đạn đến mục tiêu', 'Cần bẩy bật lên', 'Rút chốt an toàn'], correct: 2 },
            { id: 68, text: 'Đối với lựu đạn F1 khi đã rút chốt an toàn (tay chưa buông cần bẩy) thì lựu đạn sẽ:', options: ['Bắt đầu chuyển động nổ', 'Chưa chuyển động nổ', 'Sau 3-4 giây sẽ chuyển động nổ', 'Sau 5-6 giây sẽ chuyển động nổ'], correct: 1 },
            { id: 69, text: 'Đối với lựu đạn F1 khi đã rút chốt an toàn, nếu mất cơ hội ném thì xử lý như thế nào?', options: ['Nhanh chóng ném đi vì lựu đạn đã chuyển động nổ', 'Nhanh chóng gài chốt an toàn lại như ban đầu', 'Nhanh chóng chôn xuống đất', 'Nhanh chóng tháo đầu nổ ra khỏi thân'], correct: 1 },
            { id: 70, text: 'Khi lựu đạn F1 đã chuyển động nổ, thì khi nào lựu đạn sẽ nổ?', options: ['Khi lựu đạn đã hết thời gian cháy chậm', 'Khi lựu đạn vừa chạm mặt đất', 'Khi lựu đạn vừa trúng mục tiêu', 'Khi lựu đạn cách mục tiêu bán kính 20 mét'], correct: 0 },
            { id: 71, text: 'Khi mục tiêu xuất hiện trong cự ly nào thì ném lựu đạn hợp lý nhất?', options: ['Khoảng 60-70 mét', 'Khoảng 55-65 mét', 'Khoảng 50-60 mét', 'Khoảng 25-30 mét'], correct: 3 },
            { id: 72, text: 'Trong tính năng, tác dụng của lựu đạn F1, nhà sản xuất cho biết thời gian cháy chậm 3-4 giây để làm gì?', options: ['Để người ném làm công tác chuẩn bị', 'Để an toàn cho người sử dụng và lựu đạn có thời gian bay đến mục tiêu', 'Để bảo đảm an toàn trong bảo quản', 'Để lựu đạn dễ sử dụng hơn'], correct: 1 },
            { id: 73, text: 'Khối lượng toàn bộ và bán kính sát thương của lựu đạn F1 là:', options: ['500g và 100 mét', '600g và 20 mét', '700g và 25 mét', '800g và 30 mét'], correct: 1 },
            { id: 74, text: 'Trang bị cho từng người trong chiến đấu, dùng để sát thương sinh lực địch và phá huỷ một số loại phương tiện chiến tranh chủ yếu bằng mảnh gang vụn và áp lực khí thuốc. Được xác định là:', options: ['Tác dụng của lựu đạn F1', 'Tác dụng của lựu đạn LKT-4', 'Tác dụng của lựu đạn C4', 'Tác dụng của lựu đạn LKM'], correct: 0 },
            { id: 75, text: 'Khối lượng toàn bộ của lựu đạn F1 là bao nhiêu gram?', options: ['400g', '500g', '600g', '700g'], correct: 2 },
            { id: 76, text: 'Chiều cao toàn bộ của lựu đạn F1 là bao nhiêu mm?', options: ['117mm', '127mm', '197mm', '188mm'], correct: 0 },
            { id: 77, text: 'Đường kính thân lựu đạn F1 là bao nhiêu mm?', options: ['45mm', '55mm', '35mm', '65mm'], correct: 1 },
            { id: 78, text: 'Khối lượng thuốc nổ của lựu đạn F1 là bao nhiêu gram?', options: ['60g', '45g', '50g', '55g'], correct: 0 },
            { id: 79, text: 'Tác dụng của bộ phận gây nổ của lựu đạn F1 là:', options: ['Để giữ an toàn và gây nổ lựu đạn', 'Để gây nổ lựu đạn', 'Để an toàn cho lựu đạn', 'Để bảo đảm an toàn trong chiến đấu'], correct: 0 },
            { id: 80, text: 'Chốt an toàn giữ không cho cần bẩy bật lên, cần bẩy giữ đuôi kim hỏa cho kim hỏa không chọc vào hạt lửa. Được xác định là:', options: ['Lựu đạn đang ở trạng thái bình thường', 'Lựu đạn ở trạng thái không bình thường', 'Các bộ phận của lựu đạn được kích hoạt', 'Lựu đạn đang có vấn đề kỹ thuật'], correct: 0 },
            { id: 81, text: 'Bán kính sát thương của lựu đạn LĐ-01 là bao nhiêu mét?', options: ['5-6m', '7-8m', '9-10m', '10-12m'], correct: 0 },
            { id: 82, text: 'Khối lượng toàn bộ của lựu đạn LĐ-01 là bao nhiêu gram?', options: ['350-445g', '365-400g', '450-550g', '365-465g'], correct: 3 },
            { id: 83, text: 'Thời gian cháy chậm của lựu đạn LĐ-01 là bao nhiêu giây?', options: ['3,2 – 4,2 giây', '4,5 – 5,5 giây', '5,2 – 6,2 giây', '6,2 – 7,2 giây'], correct: 0 },

            // ---- TIÊN CÔNG ----
            { id: 84, text: 'Trong chiến đấu tiến công, từng người hoặc cùng tổ bộ binh thường đảm nhiệm đánh chiếm các mục tiêu như ụ súng, lô cốt. Được xác định là một trong những:', options: ['Cách đánh', 'Nhiệm vụ', 'Yêu cầu chiến thuật', 'Hành động của chiến sĩ'], correct: 1 },
            { id: 85, text: 'Trong chiến đấu tiến công, từng người hoặc cùng tổ bộ binh thường đảm nhiệm đánh chiếm các mục tiêu như xe tăng, xe bọc thép địch. Được xác định là một trong những:', options: ['Cách đánh', 'Nhiệm vụ', 'Yêu cầu chiến thuật', 'Hành động của chiến sĩ'], correct: 1 },
            { id: 86, text: 'Trong chiến đấu tiến công, từng người hoặc cùng tổ bộ binh thường đảm nhiệm đánh chiếm các mục tiêu như tên địch, tốp địch ngoài công sự. Được xác định là một trong những:', options: ['Cách đánh', 'Nhiệm vụ', 'Yêu cầu chiến thuật', 'Hành động của chiến sĩ'], correct: 1 },
            { id: 87, text: 'Trong chiến đấu tiến công, từng người hoặc cùng tổ bộ binh thường đảm nhiệm đánh chiếm các mục tiêu như chiến hào, giao thông hào, căn nhà. Được xác định là một trong những:', options: ['Cách đánh', 'Nhiệm vụ', 'Yêu cầu chiến thuật', 'Hành động của chiến sĩ'], correct: 1 },
            { id: 88, text: 'Khi chiến sĩ đang phát triển chiến đấu đánh chiếm mục tiêu xe tăng địch nằm trong công sự bằng bộc phá khối, chiến sĩ sẽ chọn vị trí nào trên xe tăng để đặt bộc phá đạt hiệu quả cao nhất?', options: ['Đỉnh nòng pháo', 'Nắp đậy ra vào của lái xe', 'Trước mũi xe tăng', 'Khoảng tiếp giáp giữa thân xe và tháp pháo'], correct: 3 },
            { id: 89, text: 'Khi chiến sĩ cơ động phát triển chiến đấu đánh chiếm mục tiêu, hỏa lực của địch bắn mạnh về bên trái, hành động xử trí hợp lý nhất là:', options: ['Nhanh chóng cơ động về phía sau báo cáo', 'Nhanh chóng tiết, thực hiện bắn gần', 'Nhanh chóng lăn sang bên trái chờ hỏa lực ngừng', 'Nhanh chóng lăn về bên phải, lợi dụng địa hình tránh hỏa lực'], correct: 3 },
            { id: 90, text: 'Ụ súng của địch thường có đặc điểm gì?', options: ['Cấu trúc hình vuông', 'Cấu trúc hình đa giác', 'Cấu trúc hình chữ nhật', 'Cấu trúc hình lăng trụ'], correct: 2 },
            { id: 91, text: 'Lô cốt của địch thường có đặc điểm gì?', options: ['Cấu trúc hình vuông', 'Cấu trúc hình lăng trụ', 'Cấu trúc hình chữ nhật', 'Cấu trúc hình đa giác'], correct: 3 },
            { id: 92, text: 'Ụ súng, lô cốt của địch thường có đặc điểm gì?', options: ['Có lỗ bắn quay về một hướng', 'Xây dựng trên bề mặt địa hình', 'Xây dựng nửa chìm nửa nổi, xung quanh có các lỗ bắn', 'Xây dựng ngầm trong lòng đất, xung quanh có lỗ bắn'], correct: 2 },
            { id: 93, text: 'Thủ đoạn đối phó của địch trong ụ súng, lô cốt khi bị ta tiến công?', options: ['Giữ bí mật, sẵn sàng hỏa lực ngăn chặn', 'Rút chạy nhanh về phía sau', 'Dựa vào ụ súng, lô cốt dùng hỏa lực bắn ngăn chặn từ xa đến gần', 'Hoang mang chờ lực lượng ứng cứu'], correct: 2 },
            { id: 94, text: 'Khi chiến sĩ ném lựu đạn vào trong ụ súng không có nắp và lựu đạn nổ, hành động xử trí tiếp theo hợp lý nhất là:', options: ['Giữ bí mật', 'Tại chỗ sử dụng hỏa lực tiêu diệt địch', 'Xông lên bắn găm, bắn gần, đâm lê, đánh bằng tiêu diệt những tên còn sống', 'Nhanh chóng cơ động về sau'], correct: 2 },
            { id: 95, text: 'Phải kết hợp nhìn và nghe nhận đầy đủ, chính xác. Nếu nội dung nào chưa rõ phải hỏi lại để người chỉ huy bổ sung. Được xác định là:', options: ['Phương pháp khi nhận nhiệm vụ', 'Phương pháp khi giao nhiệm vụ', 'Phương pháp sau khi hoàn thành nhiệm vụ', 'Phương pháp làm công tác chuẩn bị'], correct: 0 },
            { id: 96, text: 'Khi chiến sĩ vận động tiếp cận, bất ngờ bị hỏa lực địch bắn làm chiến sĩ bị thương nhẹ vào cánh tay trái, hành động hợp lý nhất là:', options: ['Vận động về sau và báo cáo', 'Hô xung phong, bắn găm, đánh gần', 'Quan sát tình hình, tại vị trí nổ súng tiêu diệt địch', 'Lợi dụng địa hình, giữ bí mật, tự băng bó, tiếp tục nhiệm vụ'], correct: 3 },
            { id: 97, text: 'Khi chiến sĩ vận động đến điểm dừng, cách ụ súng không nắp 25-30 mét và ném lựu đạn đầu tiên nhưng không nổ, hành động tiếp theo hợp lý nhất là:', options: ['Xung phong bắn găm, đánh gần', 'Tiếp tục ném quả lựu đạn tiếp theo', 'Vận động về sau báo cáo', 'Quan sát, tại vị trí nổ súng tiêu diệt địch'], correct: 1 },
            { id: 98, text: 'Khi chiến sĩ xung phong đánh chiếm ụ súng không nắp và phát hiện một tên địch còn sống giơ tay đầu hàng, hành động hợp lý nhất là:', options: ['Nổ súng tiêu diệt tất cả', 'Vận động về sau báo cáo', 'Thu vũ khí, bắt tù binh, lùng sục bắt sống hoặc tiêu diệt những tên còn sống khác', 'Bắt sống tên địch và đưa về phía sau'], correct: 2 },

            { id: 130, text: 'Chính diện và chiều sâu trận địa phòng ngự của từng người là bao nhiêu mét?', options: ['50-55 mét', '45-50 mét', '35-40 mét', '25-30 mét'], correct: 2 },
            { id: 131, text: 'Tham gia làm nhiệm vụ đánh địch vòng ngoài. Được xác định là một trong những:', options: ['Đánh bại địch tiến công phía trước, hai bên sườn và trên không', 'Nhiệm vụ của từng người trong phòng ngự', 'Yêu cầu chiến thuật', 'Cách đánh'], correct: 1 },
            { id: 132, text: 'Trong chiến đấu phòng ngự, tình huống nguy hiểm nhất là:', options: ['Địch đột nhập vào một phần trận địa', 'Địch đã phá xong vật cản', 'Xe tăng, thiết giáp đang xuất phát tiến công', 'Địch đã triển khai đội hình tiến công'], correct: 0 },
            { id: 133, text: 'Gây cản trở và làm chậm bước tiến của địch. Được xác định là:', options: ['Yêu cầu chiến thuật trong tiến công', 'Mục đích của bố trí vật cản', 'Yêu cầu chiến thuật trong phòng ngự', 'Cách đánh ụ súng'], correct: 1 },
            { id: 134, text: 'Che giấu người, vũ khí, trang bị, công sự, bảo đảm an toàn trong chiến đấu, không bị địch phát hiện. Được xác định là:', options: ['Tác dụng của hố bắn', 'Tác dụng của ngụy trang', 'Tác dụng của hào', 'Tác dụng của hầm ngầm'], correct: 1 },
            { id: 135, text: 'Trong chiến đấu phòng ngự, trường hợp nào chiến sĩ mới được rời khỏi trận địa?', options: ['Khi địch đã rút', 'Khi có lệnh của người chỉ huy', 'Khi hết đạn', 'Khi bị thương nặng'], correct: 1 }
        ];

        // ===================== LOGIC HIỂN THỊ =====================
        const container = document.getElementById('questions-container');
        const progressEl = document.getElementById('progress');

        // Lưu trạng thái: mỗi câu lưu selectedIndex (-1 nếu chưa chọn)
        let selected = new Array(questionsData.length).fill(-1);
        let showAllCorrect = false; // chế độ hiển thị tất cả đáp án

        function render() {
            let html = '';
            let answeredCount = 0;
            questionsData.forEach((q, idx) => {
                const sel = selected[idx];
                const isAnswered = sel !== -1;
                if (isAnswered) answeredCount++;

                html += `<div class="question-block" data-idx="${idx}">`;
                html += `<div class="q-header"><span class="q-number">${idx+1}</span><span class="q-text">${q.text}</span></div>`;
                html += `<div class="options">`;
                q.options.forEach((opt, optIdx) => {
                    let classes = 'option';
                    const isSelected = (sel === optIdx);
                    const isCorrect = (optIdx === q.correct);

                    // Xác định màu sắc dựa trên trạng thái
                    if (showAllCorrect) {
                        // Chế độ xem đáp án: tô xanh cho đáp án đúng
                        if (isCorrect) classes += ' correct';
                        // Nếu đã chọn sai thì vẫn hiện đỏ?
                        if (isSelected && !isCorrect) classes += ' wrong';
                        else if (isSelected && isCorrect) classes += ' correct';
                    } else {
                        if (isSelected) {
                            if (isCorrect) {
                                classes += ' correct';
                            } else {
                                classes += ' wrong';
                                // Đồng thời hiển thị đáp án đúng (xanh)
                                // Ta sẽ thêm class 'show-correct' cho đáp án đúng
                                // Nhưng để tránh lẫn, ta sẽ thêm sau vòng lặp
                            }
                        }
                    }

                    // Thêm class disabled nếu đã chọn (không cho thay đổi)
                    if (isAnswered && !showAllCorrect) classes += ' disabled';

                    let label = String.fromCharCode(97 + optIdx); // a, b, c, d
                    html += `<div class="${classes}" data-optidx="${optIdx}" onclick="handleSelect(${idx}, ${optIdx})">`;
                    html += `<span class="label">${label}.</span>`;
                    html += `<span class="text">${opt}</span>`;
                    html += `</div>`;
                });
                html += `</div>`;

                // Hiển thị badge kết quả nếu đã chọn (và không ở chế độ xem đáp án)
                if (isAnswered && !showAllCorrect) {
                    const isCorrect = (sel === q.correct);
                    const badgeClass = isCorrect ? 'correct' : 'wrong';
                    const badgeText = isCorrect ? '✅ Đúng' : '❌ Sai';
                    html += `<div class="result-badge ${badgeClass}">${badgeText}</div>`;
                }

                // Nếu chọn sai và chưa show all, hiển thị đáp án đúng bên dưới (xanh)
                if (isAnswered && !showAllCorrect && sel !== q.correct) {
                    html += `<div style="margin-top:6px; font-size:14px; color:#28a745; font-weight:500;">✔️ Đáp án đúng: ${String.fromCharCode(97 + q.correct)}. ${q.options[q.correct]}</div>`;
                }

                html += `</div>`;
            });

            container.innerHTML = html;

            // Cập nhật tiến độ
            progressEl.textContent = `Đã trả lời: ${answeredCount} / ${questionsData.length} câu`;

            // Nếu showAllCorrect, không cho thao tác click (đã disabled)
        }

        // Xử lý chọn đáp án
        window.handleSelect = function(qIdx, optIdx) {
            // Nếu đã chọn hoặc đang xem đáp án, không làm gì
            if (selected[qIdx] !== -1 || showAllCorrect) return;

            selected[qIdx] = optIdx;
            render();
        };

        // Hiển thị tất cả đáp án đúng
        document.getElementById('showAllBtn').addEventListener('click', function() {
            showAllCorrect = !showAllCorrect; // bật/tắt chế độ xem đáp án
            // Nếu bật, ta có thể đánh dấu tất cả đáp án đúng và không cho chọn
            if (showAllCorrect) {
                // Không cần thay đổi selected, chỉ render lại với showAllCorrect = true
                render();
                // Khóa tất cả các lựa chọn (thêm class disabled)
                document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'none');
                this.textContent = '📌 Ẩn đáp án';
            } else {
                render();
                document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'auto');
                this.textContent = '📌 Hiển thị tất cả đáp án đúng';
            }
        });

        // Làm lại
        document.getElementById('resetBtn').addEventListener('click', function() {
            selected.fill(-1);
            showAllCorrect = false;
            document.getElementById('showAllBtn').textContent = '📌 Hiển thị tất cả đáp án đúng';
            render();
            document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'auto');
        });

        // Khởi tạo lần đầu
        render();
    </script>
</body>
</html>
