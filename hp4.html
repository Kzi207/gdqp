<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trắc nghiệm HP4 - Azota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            padding: 28px 24px 36px;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #e6edf4;
            padding-bottom: 18px;
            margin-bottom: 24px;
        }
        h1 i {
            color: #2a7de1;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 28px;
            background: #f8fafd;
            padding: 14px 22px;
            border-radius: 60px;
            margin-bottom: 28px;
            font-size: 15px;
            font-weight: 500;
            color: #1e3a5f;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats i {
            color: #2a7de1;
            width: 20px;
            text-align: center;
        }
        .question-item {
            background: #ffffff;
            border: 1px solid #e2e9f2;
            border-radius: 16px;
            padding: 20px 22px 18px;
            margin-bottom: 18px;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0, 20, 40, 0.02);
        }
        .question-item:hover {
            border-color: #b8d0e8;
            background: #fafcff;
        }
        .question-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-weight: 600;
            font-size: 17px;
            color: #0b2b4a;
            margin-bottom: 12px;
        }
        .question-header .qnum {
            background: #eef4fc;
            color: #1a5fb0;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
        }
        .question-text {
            font-size: 16px;
            line-height: 1.6;
            color: #1c2f44;
            margin-bottom: 14px;
            padding-left: 4px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 6px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 16px 8px 12px;
            border-radius: 40px;
            background: #f6f9fe;
            border: 1px solid transparent;
            transition: 0.1s;
            cursor: pointer;
            font-size: 15px;
            color: #1d344b;
        }
        .option:hover {
            background: #eaf1fc;
            border-color: #b8d0e8;
        }
        .option input[type="radio"] {
            accent-color: #1a5fb0;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .option .letter {
            font-weight: 700;
            color: #1a5fb0;
            min-width: 22px;
        }
        .option .answer-text {
            flex: 1;
        }
        .option.selected {
            background: #ddeeff;
            border-color: #2a7de1;
        }
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        .option.wrong {
            background: #f8dddd;
            border-color: #dc3545;
        }
        .option.disabled {
            opacity: 0.85;
            cursor: default;
        }
        .option.disabled:hover {
            background: #f6f9fe;
            border-color: transparent;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            gap: 16px;
            border-top: 1px solid #e2e9f2;
            padding-top: 28px;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            background: #eef3f9;
            color: #1e3a5f;
        }
        .btn-primary {
            background: #1a5fb0;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0f4a8f;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(26, 95, 176, 0.25);
        }
        .btn-success {
            background: #1e7e34;
            color: #fff;
        }
        .btn-success:hover {
            background: #146128;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(30, 126, 52, 0.25);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #b8cfe5;
        }
        .btn-outline:hover {
            background: #e6eff9;
            border-color: #2a7de1;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: none !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .result-box {
            background: #eef4fc;
            border-radius: 16px;
            padding: 18px 24px;
            margin-top: 24px;
            display: none;
            border-left: 6px solid #1a5fb0;
        }
        .result-box.show {
            display: block;
        }
        .result-box .score {
            font-size: 22px;
            font-weight: 700;
            color: #0b2b4a;
        }
        .result-box .detail {
            margin-top: 8px;
            font-size: 15px;
            color: #1d3b5c;
        }

        @media (max-width: 640px) {
            .container { padding: 18px 12px 28px; }
            .question-item { padding: 16px 14px; }
            .stats { font-size: 13px; padding: 10px 16px; gap: 8px 16px; }
            .btn { padding: 10px 20px; font-size: 14px; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .action-bar .btn { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        <i class="fas fa-graduation-cap"></i>
        Trắc nghiệm HP4
        <span style="font-size:14px; font-weight:400; margin-left:auto; color:#5b7b9c;">
            <i class="fas fa-clock"></i> 45 phút
        </span>
    </h1>

    <div class="stats">
        <span><i class="fas fa-list-ul"></i> <span id="totalQ">0</span> câu</span>
        <span><i class="fas fa-check-circle"></i> Đã làm: <span id="answeredCount">0</span></span>
        <span><i class="fas fa-flag"></i> Bài: HP4</span>
    </div>

    <div id="questionsContainer"></div>

    <div class="action-bar">
        <div>
            <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo-alt"></i> Làm lại</button>
        </div>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn btn-primary" id="submitBtn"><i class="fas fa-paper-plane"></i> Nộp bài</button>
            <button class="btn btn-success" id="showAnswerBtn" disabled><i class="fas fa-eye"></i> Xem đáp án</button>
        </div>
    </div>

    <div class="result-box" id="resultBox">
        <div class="score" id="scoreDisplay">Điểm: 0 / 0</div>
        <div class="detail" id="resultDetail"></div>
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // Dữ liệu câu hỏi (trích từ tài liệu HP4)
    // Mỗi câu: { question, options: [a,b,c,d], answer: index (0-3) }
    // ------------------------------------------------------------
    const questionsData = [
        // Phần Súng AK
        {
            question: 'Súng tiểu liên AK có cỡ nòng là bao nhiêu mm?',

        },
        {
            question: 'Khi bắn súng tiểu liên AK (góc bắn tốt nhất), thì bay xa nhất của đầu đạn là bao nhiêu mét?',
            options: ['3.000 mét', '1.500 mét', '3.600 mét', '800 mét'],
            answer: 0
        },
        {
            question: 'Tầm bắn hiệu quả: Hỏa lực tập trung bắn mục tiêu mặt đất của súng tiểu liên AK đến cự ly bao nhiêu mét?',
            options: ['500 mét', '1.500 mét', '3.000 mét', '800 mét'],

        },
        {
            question: 'Yếu tố nào sau đây làm ảnh hưởng đến đường đạn bay trong không khí là một đường cong?',
            options: ['Do động tác người bắn', 'Do trọng lượng của súng', 'Do cấu tạo của súng và đạn', 'Lực cản của không khí'],
            answer: 3

        {
            question: 'Là đường ngắm cơ bản được đóng vào điểm ngắm đã xác định trên mục tiêu với điều kiện mặt súng thẳng bằng. Được xác định là:',
            options: ['Đường ngắm sai', 'Điểm ngắm đúng', 'Đường ngắm đúng', 'Đường ngắm cơ bản'],
            answer: 2
        },
        {
            question: 'Khi bắn, mặt súng bị nghiêng thì:',
            options: ['Mặt súng nghiêng về bên nào, đạn lệch về bên đó và lên cao.', 'Mặt súng nghiêng về bên nào, đạn lệch theo chiều ngược lại và thấp xuống.', 'Mặt súng nghiêng về bên nào, đạn lệch về bên đó và thấp xuống.', 'Mặt súng nghiêng về bên nào, đạn lệch theo chiều ngược lại và lên cao.'],
            answer: 0
        },
        {
            question: 'Tầm bay xa nhất của đầu đạn súng tiểu liên AK đạt 3.000 mét khi đó góc bắn là bao nhiêu độ?',
            options: ['70⁰ – 90⁰', '32⁰ – 35⁰', '40⁰ – 45⁰', '10⁰ – 15⁰'],
            answer: 1
        },
        {
            question: 'Là đường thẳng từ mắt người ngắm qua chính giữa mép trên khe ngắm (tâm lỗ ngắm) đến điểm chính giữa mép trên đầu ngắm. Được xác định là:',
            options: ['Khái niệm đường ngắm cơ bản.', 'Khái niệm đường ngắm đúng.', 'Khái niệm điểm ngắm đúng.', 'Khái niệm điểm bắn đúng.'],
            answer: 0
        },
        {
            question: 'Trọng lượng của súng tiểu liên AK khi không có đạn và khi đã lắp đủ đạn là bao nhiêu kg?',
            options: ['3,8kg và 4,3kg.', '3,8kg và 4,8kg.', '3,5kg và 4,3kg.', '4,3kg và 5,8kg.'],
            answer: 0
        },
        {
            question: 'Nếu đầu ngắm thấp hơn mép trên khe ngắm, thì điểm chạm của đạn sẽ:',
            options: ['Cao hơn so với điểm định bắn trúng.', 'Thấp hơn so với điểm định bắn trúng.', 'Thấp hơn và lệch sang phải so với điểm định bắn trúng.', 'Thấp hơn và lệch sang trái so với điểm định bắn trúng.'],
            answer: 0
        },
        {
            question: 'Tầm bắn thẳng của súng tiểu liên AK, khi mục tiêu người nằm cao 0,5 mét là bao nhiêu mét?',
            options: ['330 mét.', '350 mét.', '710 mét.', '735 mét.'],
            answer: 0
        },
        {
            question: 'Khi ngắm chụm kết quả đánh giá giỏi là:',
            options: ['3 điểm ngắm được chấm, lọt vào lỗ có đường kính 10 mm.', '3 điểm ngắm được chấm, lọt vào lỗ có đường kính 5 mm.', '3 điểm ngắm được chấm, lọt vào lỗ có đường kính 2 mm.', '3 điểm ngắm được chấm, lọt vào lỗ có đường kính 7 mm.'],
            answer: 0
        },
        {
            question: 'Nếu đầu ngắm cao hơn mép trên khe ngắm, thì điểm chạm của đạn sẽ:',
            options: ['Thấp hơn so với điểm định bắn trúng.', 'Cao hơn so với điểm định bắn trúng.', 'Thấp hơn và lệch sang phải so với điểm định bắn trúng.', 'Thấp hơn và lệch sang trái so với điểm định bắn trúng.'],
            answer: 0
        },
        {
            question: 'Tốc độ đầu của đầu đạn súng tiểu liên AKM là bao nhiêu mét/giây?',
            options: ['710 mét/giây.', '715 mét/giây.', '735 mét/giây.', '815 mét/giây.'],
            answer: 0
        },
        {
            question: 'Đường đạn trong không khí là một đường cong không cân đối, góc phóng nhỏ hơn góc rơi, đoạn lên căng và dài hơn đoạn xuống, đỉnh đường đạn gần điểm rơi hơn điểm phóng. Được xác định là:',
            options: ['Đặc điểm đường đạn.', 'Các nguyên nhân gây ra góc nấy.', 'Khái niệm đường ngắm cơ bản.', 'Khái niệm đường ngắm đúng.'],
            answer: 0
        },
        {
            question: 'Yếu tố nào sau đây làm ảnh hưởng đến đường đạn trong không khí?',
            options: ['Do động tác người bắn.', 'Do trọng lực của đầu đạn.', 'Do trọng lượng của súng.', 'Do cấu tạo của súng và đạn.'],
            answer: 1
        },
        {
            question: 'Tầm bắn hiệu quả: Hỏa lực tập trung bắn máy bay quân nhảy dù của súng tiểu liên AK đến cự ly bao nhiêu mét?',
            options: ['500 mét.', '700 mét.', '800 mét.', '1.000 mét.'],
            answer: 0
        },
        {
            question: 'Nếu đầu ngắm cao hơn mép trên khe ngắm và lệch trái, so với điểm bắn trúng thì:',
            options: ['Thấp hơn và lệch sang phải', 'Thấp hơn và lệch sang trái', 'Cao hơn và lệch sang trái', 'Cao hơn và lệch sang phải'],
            answer: 2
        },
        // Phần Lựu đạn
        {
            question: 'Chuyển động nổ của lựu đạn F1 được tính từ:',
            options: ['Khi rút chốt an toàn và lựu đạn rời khỏi tay.', 'Khi lựu đạn bay đến mục tiêu.', 'Khi lấy lựu đạn ra khỏi túi đựng lựu đạn.', 'Khi lựu đạn đã rút chốt an toàn.'],
            answer: 0
        },
        {
            question: 'Khi ném, để lựu đạn bay được xa nhất thì thời cơ buông lựu đạn tốt nhất là:',
            options: ['Cánh tay hợp với mặt phẳng ngang một góc 45°', 'Cánh tay hợp với mặt phẳng ngang một góc 35°', 'Cánh tay hợp với mặt phẳng ngang một góc 25°', 'Cánh tay hợp với mặt phẳng ngang một góc 15°'],
            answer: 0
        },
        {
            question: 'Trong kỹ thuật sử dụng lựu đạn thuật ngữ nào sau đây là đúng:',
            options: ['Ném lựu đạn.', 'Ném lựu đạn.', 'Ném lựu đạn.', 'Ném lựu đạn.'],
            answer: 0
        },
        // Phần Tiến công
        {
            question: 'Trong chiến đấu tiến công, từng người hoặc cùng tổ bộ binh thường đảm nhiệm đánh chiếm các mục tiêu như ụ súng, lô cốt. Được xác định là một trong những:',
            options: ['Cách đánh.', 'Nhiệm vụ.', 'Yêu cầu chiến thuật.', 'Hành động của chiến sĩ khi thực hành đánh chiếm mục tiêu.'],
            answer: 1
        },
        {
            question: 'Trong chiến đấu tiến công, từng người hoặc cùng tổ bộ binh thường đảm nhiệm đánh chiếm các mục tiêu như xe tăng, xe bọc thép địch. Được xác định là một trong những:',
            options: ['Cách đánh.', 'Nhiệm vụ.', 'Yêu cầu chiến thuật.', 'Hành động của chiến sĩ khi thực hành đánh chiếm mục tiêu.'],
            answer: 1
        },
        {
            question: 'Trong chiến đấu tiến công, từng người hoặc cùng tổ bộ binh thường đảm nhiệm đánh chiếm các mục tiêu như tên địch, tốp địch ngoài công sự. Được xác định là một trong những:',
            options: ['Cách đánh.', 'Nhiệm vụ.', 'Yêu cầu chiến thuật.', 'Hành động của chiến sĩ khi thực hành đánh chiếm mục tiêu.'],
            answer: 1
        },
        // Phần Phòng ngự
        {
            question: 'Trong chiến đấu phòng ngự, trong trường hợp nào thì chiến sĩ bắn truy kích tiêu diệt địch?',
            options: ['Khi địch đột nhập.', 'Khi hóa lực địch bắn phá chuẩn bị.', 'Khi địch tiến công.', 'Khi địch rút chạy.'],
            answer: 3
        },
        {
            question: 'Trong chiến đấu phòng ngự, khi địch thực hành xung phong vào trước trận địa của chiến sĩ, cùng lúc có nhiều mục tiêu xuất hiện trong tầm bắn hiệu quả của súng tiểu liên AK, chiến sĩ sẽ chọn mục tiêu nào để nổ súng tiêu diệt trước là hợp lý nhất?',
            options: ['Tổ mang vô tuyến điện (cự ly 400m).', 'Xe tăng, xe bọc thép (cự ly 400m).', 'Tốp bộ binh 3-5 tên (cự ly 400m).', 'Cụm súng cối (cự ly 800m).'],
            answer: 2
        },
        {
            question: 'Trong chiến đấu phòng ngự, khi địch thực hành xung phong, cùng lúc có nhiều mục tiêu xuất hiện trong tầm bắn hiệu quả của súng B41, chiến sĩ sẽ chọn mục tiêu nào để nổ súng tiêu diệt trước?',
            options: ['Xe tăng, xe bọc thép (cự ly 330m).', 'Tốp bộ binh 10-15 (cự ly 350m).', 'Tổ mang vô tuyến điện (cự ly 350m).', 'Cụm súng cối (cự ly 800m).'],
            answer: 0
        }
    ];

    // ============================================================
    // Ứng dụng
    // ============================================================
    const app = {
        data: questionsData,
        userAnswers: new Array(questionsData.length).fill(null),
        isSubmitted: false,

        init() {
            this.renderQuestions();
            this.updateStats();
            this.bindEvents();
        },

        renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            this.data.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.dataset.index = idx;

                const optionsHtml = q.options.map((opt, optIdx) => `
                    <label class="option" data-q="${idx}" data-opt="${optIdx}">
                        <input type="radio" name="q${idx}" value="${optIdx}" />
                        <span class="letter">${String.fromCharCode(65 + optIdx)}.</span>
                        <span class="answer-text">${opt}</span>
                    </label>
                `).join('');

                div.innerHTML = `
                    <div class="question-header">
                        <span class="qnum">Câu ${idx+1}</span>
                    </div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">${optionsHtml}</div>
                `;
                container.appendChild(div);
            });
        },

        updateStats() {
            document.getElementById('totalQ').textContent = this.data.length;
            const answered = this.userAnswers.filter(a => a !== null).length;
            document.getElementById('answeredCount').textContent = answered;
        },

        bindEvents() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (this.isSubmitted) return;
                    const label = e.target.closest('.option');
                    const qIdx = parseInt(label.dataset.q);
                    const optIdx = parseInt(label.dataset.opt);
                    document.querySelectorAll(`.option[data-q="${qIdx}"]`).forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    label.classList.add('selected');
                    this.userAnswers[qIdx] = optIdx;
                    this.updateStats();
                });
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                if (this.isSubmitted) {
                    if (!confirm('Bạn đã nộp bài. Làm lại sẽ xóa kết quả. Tiếp tục?')) return;
                }
                this.resetExam();
            });

            document.getElementById('submitBtn').addEventListener('click', () => {
                if (this.isSubmitted) {
                    alert('Bạn đã nộp bài rồi! Hãy nhấn "Làm lại" để làm mới.');
                    return;
                }
                const unanswered = this.userAnswers.some(a => a === null);
                if (unanswered) {
                    if (!confirm('Bạn chưa trả lời hết câu hỏi. Vẫn muốn nộp bài?')) return;
                }
                this.submitExam();
            });

            document.getElementById('showAnswerBtn').addEventListener('click', () => {
                if (!this.isSubmitted) {
                    alert('Bạn cần nộp bài trước khi xem đáp án.');
                    return;
                }
                this.revealAnswers();
            });
        },

        resetExam() {
            this.isSubmitted = false;
            this.userAnswers.fill(null);
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected', 'correct', 'wrong', 'disabled');
                const radio = opt.querySelector('input[type="radio"]');
                if (radio) radio.checked = false;
            });
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('showAnswerBtn').disabled = true;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-paper-plane"></i> Nộp bài';
            this.updateStats();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        submitExam() {
            this.isSubmitted = true;
            let correct = 0;
            this.data.forEach((q, idx) => {
                const chosen = this.userAnswers[idx];
                if (chosen !== null && chosen === q.answer) correct++;
            });
            const total = this.data.length;
            document.getElementById('scoreDisplay').textContent = `Điểm: ${correct} / ${total}`;
            const percent = Math.round((correct / total) * 100);
            document.getElementById('resultDetail').textContent = `Bạn đã trả lời đúng ${correct}/${total} câu (${percent}%).`;

            const box = document.getElementById('resultBox');
            box.classList.add('show');

            document.querySelectorAll('.option').forEach(opt => {
                const qIdx = parseInt(opt.dataset.q);
                const optIdx = parseInt(opt.dataset.opt);
                const radio = opt.querySelector('input[type="radio"]');
                radio.disabled = true;
                opt.classList.add('disabled');

                const correctAns = this.data[qIdx].answer;
                if (optIdx === correctAns) {
                    opt.classList.add('correct');
                } else if (optIdx === this.userAnswers[qIdx] && this.userAnswers[qIdx] !== correctAns) {
                    opt.classList.add('wrong');
                }
                if (optIdx === this.userAnswers[qIdx] && this.userAnswers[qIdx] === correctAns) {
                    opt.classList.add('correct');
                }
            });

            document.getElementById('showAnswerBtn').disabled = false;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-check-circle"></i> Đã nộp';
            this.updateStats();
        },

        revealAnswers() {
            document.querySelectorAll('.option').forEach(opt => {
                const qIdx = parseInt(opt.dataset.q);
                const optIdx = parseInt(opt.dataset.opt);
                const correctAns = this.data[qIdx].answer;
                if (optIdx === correctAns) {
                    opt.classList.add('correct');
                }
            });
            alert('Đã hiển thị đáp án đúng (màu xanh).');
        }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
