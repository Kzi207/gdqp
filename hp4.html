<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📘 Trắc nghiệm HP4 - Quân sự</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fc;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 920px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 30px 35px 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid #e9edf4;
            padding-bottom: 18px;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #1e4b7a, #2a6b9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 15px;
            color: #475569;
        }
        .header .info span {
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
        }
        .header .info .progress-text {
            background: #dbeafe;
            color: #1e4b7a;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .question-card {
            background: #fafcff;
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 24px;
            border: 1px solid #e9edf4;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .question-card:hover {
            border-color: #cbd5e1;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .question-number {
            font-weight: 700;
            font-size: 17px;
            color: #1e293b;
            background: #eef2f6;
            padding: 2px 14px;
            border-radius: 30px;
        }
        .question-status {
            font-size: 14px;
            color: #64748b;
        }
        .question-text {
            font-size: 17px;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 18px;
            color: #0f172a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 4px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 15px;
            color: #1e293b;
        }
        .option:hover:not(.disabled) {
            background: #f8fafc;
            border-color: #94a3b8;
        }
        .option input[type="radio"] {
            accent-color: #2563eb;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            pointer-events: none;
        }
        .option.selected-correct {
            border-color: #16a34a;
            background: #f0fdf4;
        }
        .option.selected-wrong {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .option.correct-reveal {
            border-color: #16a34a;
            background: #f0fdf4;
        }
        .option.wrong-reveal {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .option.disabled {
            opacity: 0.7;
            cursor: default;
        }
        .option .letter {
            font-weight: 700;
            color: #475569;
            width: 24px;
            flex-shrink: 0;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e9edf4;
        }
        .footer .stats {
            font-size: 15px;
            color: #475569;
        }
        .footer .stats strong {
            color: #1e293b;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #94a3b8;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .result-box {
            margin-top: 20px;
            padding: 18px 24px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #d1d9e6;
            display: none;
            font-size: 16px;
            line-height: 1.6;
        }
        .result-box.show {
            display: block;
        }
        .result-box .score {
            font-size: 28px;
            font-weight: 700;
            color: #1e4b7a;
        }
        .result-box .detail {
            margin-top: 10px;
            color: #334155;
        }
        .result-box .correct-count {
            color: #16a34a;
            font-weight: 600;
        }
        .result-box .wrong-count {
            color: #dc2626;
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .question-card { padding: 16px; }
            .header h1 { font-size: 20px; }
            .footer { flex-direction: column; align-items: stretch; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>📘 Trắc nghiệm HP4 - Quân sự</h1>
        <div class="info">
            <span class="progress-text" id="answeredCount">0/0</span>
            <span id="totalQuestions">0</span>
        </div>
    </div>
    <div class="progress-bar">
        <div class="fill" id="progressFill"></div>
    </div>

    <div id="questionsContainer"></div>

    <div class="footer">
        <div class="stats">
            <span id="statsText">Đã trả lời: <strong id="answeredStats">0</strong> / <strong id="totalStats">0</strong></span>
        </div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button class="btn btn-outline" onclick="resetExam()">🔄 Làm lại</button>
            <button class="btn btn-primary" id="submitBtn" onclick="submitExam()">📝 Nộp bài</button>
        </div>
    </div>

    <div class="result-box" id="resultBox">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <span class="score" id="scoreDisplay">0%</span>
            <span style="font-size: 15px; color: #475569;">
                <span class="correct-count" id="correctCount">0</span> đúng · 
                <span class="wrong-count" id="wrongCount">0</span> sai
            </span>
        </div>
        <div class="detail" id="resultDetail"></div>
    </div>
</div>

<script>
    // ============================================================
    // 📌 DỮ LIỆU CÂU HỎI HP4 (từ hp4m.pdf)

            opts: ["Nổ súng tiêu diệt địch khi địch cách 900m ÷ 1000m.", "Nắm vững thời cơ, có lệnh của cấp trên, địch vào trong tầm bắn hiệu quả, bất ngờ dùng vũ khí tiêu diệt địch.", "Kiên quyết giữ vững trận địa, khi địch cách ta 70m ÷ 100m dùng lựu đạn tiêu diệt.", "Căn cứ vào cách đánh đã chọn, bí mật chờ địch vào gần, chuyển vị trí chiến đấu."],

            ans: 1
        },
        {
            q: "Một trong những yêu cầu chiến thuật của từng người trong chiến đấu phòng ngự là:",

            ans: 0
        },
        {

            opts: ["Xây dựng công sự chiến đấu vững chắc, ngày càng kiên cố, ngụy trang bí mật.", "Độc lập chiến đấu chủ động hiệp đồng liên tục chiến đấu.", "Phát hiện và tận dụng những nơi sơ hở, hiểm yếu của địch tiếp cận tiêu diệt.", "Đánh nhanh sục sạo kỹ, vừa đánh vừa địch vận."],
            ans: 0
        },
        {
            q: "Một trong những yêu cầu chiến thuật của từng người trong chiến đấu phòng ngự là:",
            opts: ["Hiệp đồng chặt chẽ với đồng đội tạo thành thế liên hoàn đánh địch.", "Độc lập chiến đấu chủ động hiệp đồng liên tục chiến đấu.", "Phát hiện và tận dụng những nơi sơ hở, hiểm yếu của địch tiếp cận tiêu diệt.", "Đánh nhanh sục sạo kỹ, vừa đánh vừa địch vận."],
            ans: 0
        },
        {
            q: "Một trong những yêu cầu chiến thuật của từng người trong chiến đấu phòng ngự là:",
            opts: ["Kiên cường, mưu trí, dũng cảm, chủ động, kiên quyết giữ vững trận địa đến cùng.", "Độc lập chiến đấu chủ động hiệp đồng liên tục chiến đấu.", "Phát hiện và tận dụng những nơi sơ hở, hiểm yếu của địch tiếp cận tiêu diệt.", "Đánh nhanh sục sạo kỹ, vừa đánh vừa địch vận."],
            ans: 0
        },
        {
            q: "Khi địch tiến công đánh chiếm vào trận địa phòng ngự của ta, địch thường sử dụng lực lượng nào sau đây?",
            opts: ["Đặc nhiệm, biệt kích, thám báo.", "Bộ binh kết hợp xe tăng, xe bọc thép tiến công.", "Bộ binh đánh bộ, thủy quân lục chiến.", "Không quân, hải quân."],
            ans: 1
        },
        {
            q: "Trong chiến đấu phòng ngự, tình huống nào sau đây được xác định là tình huống nguy hiểm nhất?",
            opts: ["Địch đột nhập vào một phần trận địa.", "Địch đã phá xong vật cản.", "Xe tăng, thiết giáp của địch đang xuất phát tiến công.", "Địch đã triển khai đội hình tiến công."],
            ans: 0
        },
        {
            q: "Gây cản trở và làm chậm bước tiến của địch. Được xác định là:",
            opts: ["Yêu cầu chiến thuật trong chiến đấu tiến công.", "Mục đích của bố trí vật cản.", "Yêu cầu chiến thuật trong chiến đấu phòng ngự.", "Cách đánh ụ súng không có nắp."],
            ans: 1
        },
        {
            q: "Che giấu người, vũ khí trang bị, phương tiện kỹ thuật, công sự, bảo đảm an toàn trong quá trình chiến đấu, không bị địch trinh sát phát hiện. Được xác định là:",
            opts: ["Tác dụng của hố bắn.", "Tác dụng của ngụy trang.", "Tác dụng của hào.", "Tác dụng của hầm ngầm."],
            ans: 1
        },
        {
            q: "Trong chiến đấu phòng ngự, trường hợp nào sau đây chiến sĩ mới được rời khỏi trận địa chiến đấu?",
            opts: ["Khi có lệnh của người chỉ huy.", "Khi địch đã rút lui hoàn toàn.", "Khi hết đạn dược.", "Khi bị thương nặng."],
            ans: 0
        },
        {
            q: "Chính diện và chiều sâu trận địa phòng ngự của từng người trong chiến đấu là bao nhiêu mét?",
            opts: ["Từ 50 - 55 mét.", "Từ 45 - 50 mét.", "Từ 35 - 40 mét.", "Từ 25 – 30 mét."],
            ans: 3
        },
        {
            q: "Tham gia làm nhiệm vụ đánh địch vòng ngoài. Được xác định là một trong những:",
            opts: ["Đánh bại địch tiến công phía trước, hai bên sườn và trên không.", "Nhiệm vụ của từng người trong chiến đấu phòng ngự.", "Yêu cầu chiến thuật.", "Cách đánh."],
            ans: 1
        }
    ];

    // ============================================================
    // ỨNG DỤNG CHÍNH
    // ============================================================
    let userAnswers = new Array(questionData.length).fill(null);
    let submitted = false;

    const container = document.getElementById('questionsContainer');
    const progressFill = document.getElementById('progressFill');
    const answeredCountSpan = document.getElementById('answeredCount');
    const totalQuestionsSpan = document.getElementById('totalQuestions');
    const answeredStats = document.getElementById('answeredStats');
    const totalStats = document.getElementById('totalStats');
    const resultBox = document.getElementById('resultBox');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const correctCountSpan = document.getElementById('correctCount');
    const wrongCountSpan = document.getElementById('wrongCount');
    const resultDetail = document.getElementById('resultDetail');
    const submitBtn = document.getElementById('submitBtn');

    function render() {
        container.innerHTML = '';
        let answered = 0;
        questionData.forEach((q, idx) => {
            const isAnswered = userAnswers[idx] !== null;
            if (isAnswered) answered++;

            const card = document.createElement('div');
            card.className = 'question-card';

            const header = document.createElement('div');
            header.className = 'question-header';
            const numSpan = document.createElement('span');
            numSpan.className = 'question-number';
            numSpan.textContent = `Câu ${idx+1}`;
            header.appendChild(numSpan);
            const statusSpan = document.createElement('span');
            statusSpan.className = 'question-status';
            if (isAnswered) {
                const ans = userAnswers[idx];
                if (ans === q.ans) {
                    statusSpan.textContent = '✅ Đúng';
                } else {
                    statusSpan.textContent = '❌ Sai';
                }
            } else {
                statusSpan.textContent = '⏳ Chưa trả lời';
            }
            header.appendChild(statusSpan);
            card.appendChild(header);

            const textDiv = document.createElement('div');
            textDiv.className = 'question-text';
            textDiv.textContent = q.q;
            card.appendChild(textDiv);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const letters = ['A', 'B', 'C', 'D'];
            q.opts.forEach((opt, oi) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                if (submitted) {
                    optDiv.classList.add('disabled');
                    if (oi === q.ans) {
                        optDiv.classList.add('correct-reveal');
                    }
                    if (userAnswers[idx] === oi && oi !== q.ans) {
                        optDiv.classList.add('wrong-reveal');
                    }
                } else {
                    if (userAnswers[idx] === oi) {
                        if (oi === q.ans) {
                            optDiv.classList.add('selected-correct');
                        } else {
                            optDiv.classList.add('selected-wrong');
                        }
                    }
                }
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${idx}`;
                radio.value = oi;
                radio.checked = (userAnswers[idx] === oi);
                if (submitted) radio.disabled = true;
                const letterSpan = document.createElement('span');
                letterSpan.className = 'letter';
                letterSpan.textContent = letters[oi] + '.';
                optDiv.appendChild(radio);
                optDiv.appendChild(letterSpan);
                const textSpan = document.createElement('span');
                textSpan.textContent = opt;
                optDiv.appendChild(textSpan);

                optDiv.addEventListener('click', function(e) {
                    if (submitted) return;
                    if (userAnswers[idx] !== oi) {
                        userAnswers[idx] = oi;
                        render();
                    }
                });

                optionsDiv.appendChild(optDiv);
            });
            card.appendChild(optionsDiv);
            container.appendChild(card);
        });

        const total = questionData.length;
        const pct = total > 0 ? (answered / total) * 100 : 0;
        progressFill.style.width = pct + '%';
        answeredCountSpan.textContent = `${answered}/${total}`;
        totalQuestionsSpan.textContent = total;
        answeredStats.textContent = answered;
        totalStats.textContent = total;

        if (submitted) {
            submitBtn.disabled = true;
            submitBtn.textContent = '✅ Đã nộp';
            showResult();
        } else {
            submitBtn.disabled = false;
            submitBtn.textContent = '📝 Nộp bài';
        }
    }

    function showResult() {
        let correct = 0;
        let wrong = 0;
        let skipped = 0;
        questionData.forEach((q, idx) => {
            const ans = userAnswers[idx];
            if (ans === null) {
                skipped++;
            } else if (ans === q.ans) {
                correct++;
            } else {
                wrong++;
            }
        });
        const total = questionData.length;
        const score = total > 0 ? Math.round((correct / total) * 100) : 0;

        scoreDisplay.textContent = score + '%';
        correctCountSpan.textContent = correct;
        wrongCountSpan.textContent = wrong;
        resultDetail.textContent = `Đúng ${correct}, Sai ${wrong}, Bỏ qua ${skipped}`;
        resultBox.classList.add('show');
    }

    function submitExam() {
        const unanswered = userAnswers.some(a => a === null);
        if (unanswered) {
            if (!confirm('Bạn còn ' + userAnswers.filter(a => a === null).length + ' câu chưa trả lời. Bạn có chắc muốn nộp bài?')) {
                return;
            }
        }
        submitted = true;
        render();
        document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetExam() {
        if (submitted) {
            if (!confirm('Bạn có muốn làm lại từ đầu? Kết quả hiện tại sẽ bị mất.')) return;
        }
        userAnswers.fill(null);
        submitted = false;
        resultBox.classList.remove('show');
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Khởi tạo
    render();
</script>
