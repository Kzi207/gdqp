<html lang="vi">
<head>

    <title>📘 Ngân hàng câu hỏi QP1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f4f7fc;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 920px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 30px 35px 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px solid #e9edf4;
            padding-bottom: 18px;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #1e4b7a, #2a6b9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 15px;
            color: #475569;
        }
        .header .info span {
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
        }
        .header .info .progress-text {
            background: #dbeafe;
            color: #1e4b7a;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .question-card {
            background: #fafcff;
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 24px;
            border: 1px solid #e9edf4;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .question-card:hover {
            border-color: #cbd5e1;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .question-number {
            font-weight: 700;
            font-size: 17px;
            color: #1e293b;
            background: #eef2f6;
            padding: 2px 14px;
            border-radius: 30px;
        }
        .question-status {
            font-size: 14px;
            color: #64748b;
        }
        .question-text {
            font-size: 17px;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 18px;
            color: #0f172a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 4px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            font-size: 15px;
            color: #1e293b;
        }
        .option:hover:not(.disabled) {
            background: #f8fafc;
            border-color: #94a3b8;
        }
        .option input[type="radio"] {
            accent-color: #2563eb;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            pointer-events: none;
        }
        .option.selected-correct {
            border-color: #16a34a;
            background: #f0fdf4;
        }
        .option.selected-wrong {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .option.correct-reveal {
            border-color: #16a34a;
            background: #f0fdf4;
        }
        .option.wrong-reveal {
            border-color: #dc2626;
            background: #fef2f2;
        }
        .option.disabled {
            opacity: 0.7;
            cursor: default;
        }
        .option .letter {
            font-weight: 700;
            color: #475569;
            width: 24px;
            flex-shrink: 0;
        }
        .feedback-text {
            margin-top: 10px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            display: none;
        }
        .feedback-text.correct {
            color: #16a34a;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            display: block;
        }
        .feedback-text.wrong {
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            display: block;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e9edf4;
        }
        .footer .stats {
            font-size: 15px;
            color: #475569;
        }
        .footer .stats strong {
            color: #1e293b;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #94a3b8;
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }
        .result-box {
            margin-top: 20px;
            padding: 18px 24px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #d1d9e6;
            display: none;
            font-size: 16px;
            line-height: 1.6;
        }
        .result-box.show {
            display: block;
        }
        .result-box .score {
            font-size: 28px;
            font-weight: 700;
            color: #1e4b7a;
        }
        .result-box .detail {
            margin-top: 10px;
            color: #334155;
        }
        .result-box .correct-count {
            color: #16a34a;
            font-weight: 600;
        }
        .result-box .wrong-count {
            color: #dc2626;
            font-weight: 600;
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .question-card { padding: 16px; }
            .header h1 { font-size: 20px; }
            .footer { flex-direction: column; align-items: stretch; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>

<div class="container" id="app">

        <h1>📖 Ngân hàng câu hỏi QP1</h1>

        </div>
    </div>

    </div>

    <div class="footer">

        </div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">

            <button class="btn btn-primary" id="submitBtn" onclick="submitExam()">📝 Nộp bài</button>
        </div>
    </div>

    <div class="result-box" id="resultBox">

    </div>
</div>

    // ============================================================
    // ỨNG DỤNG CHÍNH
    // ============================================================
    let userAnswers = new Array(questionData.length).fill(null);
    let submitted = false;

    const container = document.getElementById('questionsContainer');
    const progressFill = document.getElementById('progressFill');
    const answeredCountSpan = document.getElementById('answeredCount');
    const totalQuestionsSpan = document.getElementById('totalQuestions');
    const answeredStats = document.getElementById('answeredStats');
    const totalStats = document.getElementById('totalStats');
    const resultBox = document.getElementById('resultBox');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const correctCountSpan = document.getElementById('correctCount');
    const wrongCountSpan = document.getElementById('wrongCount');
    const resultDetail = document.getElementById('resultDetail');
    const submitBtn = document.getElementById('submitBtn');

    function render() {
        container.innerHTML = '';
        let answered = 0;
        questionData.forEach((q, idx) => {
            const isAnswered = userAnswers[idx] !== null;
            if (isAnswered) answered++;

            const card = document.createElement('div');
            card.className = 'question-card';

            const header = document.createElement('div');
            header.className = 'question-header';
            const numSpan = document.createElement('span');
            numSpan.className = 'question-number';
            numSpan.textContent = `Câu ${idx+1}`;
            header.appendChild(numSpan);
            const statusSpan = document.createElement('span');
            statusSpan.className = 'question-status';
            if (isAnswered) {
                const ans = userAnswers[idx];
                if (ans === q.answer) {
                    statusSpan.textContent = '✅ Đúng';
                } else {
                    statusSpan.textContent = '❌ Sai';
                }
            } else {
                statusSpan.textContent = '⏳ Chưa trả lời';
            }
            header.appendChild(statusSpan);
            card.appendChild(header);

            const textDiv = document.createElement('div');
            textDiv.className = 'question-text';
            textDiv.textContent = q.question;
            card.appendChild(textDiv);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, oi) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                if (submitted) {
                    optDiv.classList.add('disabled');
                    if (oi === q.answer) {
                        optDiv.classList.add('correct-reveal');
                    }
                    if (userAnswers[idx] === oi && oi !== q.answer) {
                        optDiv.classList.add('wrong-reveal');
                    }
                } else {
                    if (userAnswers[idx] === oi) {
                        if (oi === q.answer) {
                            optDiv.classList.add('selected-correct');
                        } else {
                            optDiv.classList.add('selected-wrong');
                        }
                    }
                }
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${idx}`;
                radio.value = oi;
                radio.checked = (userAnswers[idx] === oi);
                if (submitted) radio.disabled = true;
                const letterSpan = document.createElement('span');
                letterSpan.className = 'letter';
                letterSpan.textContent = letters[oi] + '.';
                optDiv.appendChild(radio);
                optDiv.appendChild(letterSpan);
                const textSpan = document.createElement('span');
                textSpan.textContent = opt;
                optDiv.appendChild(textSpan);

                // Click vào toàn bộ option để chọn
                optDiv.addEventListener('click', function(e) {
                    if (submitted) return;
                    if (userAnswers[idx] !== oi) {
                        userAnswers[idx] = oi;
                        render();
                    }
                });

                optionsDiv.appendChild(optDiv);
            });
            card.appendChild(optionsDiv);
            container.appendChild(card);
        });

        // Cập nhật tiến độ
        const total = questionData.length;
        const pct = total > 0 ? (answered / total) * 100 : 0;
        progressFill.style.width = pct + '%';
        answeredCountSpan.textContent = `${answered}/${total}`;
        totalQuestionsSpan.textContent = total;
        answeredStats.textContent = answered;
        totalStats.textContent = total;

        if (submitted) {
            submitBtn.disabled = true;
            submitBtn.textContent = '✅ Đã nộp';
            showResult();
        } else {
            submitBtn.disabled = false;
            submitBtn.textContent = '📝 Nộp bài';
        }
    }

    function showResult() {
        let correct = 0;
        let wrong = 0;
        let skipped = 0;
        questionData.forEach((q, idx) => {
            const ans = userAnswers[idx];
            if (ans === null) {
                skipped++;
            } else if (ans === q.answer) {
                correct++;
            } else {
                wrong++;
            }
        });
        const total = questionData.length;
        const score = total > 0 ? Math.round((correct / total) * 100) : 0;

        scoreDisplay.textContent = score + '%';
        correctCountSpan.textContent = correct;
        wrongCountSpan.textContent = wrong;
        resultDetail.textContent = `Đúng ${correct}, Sai ${wrong}, Bỏ qua ${skipped}`;
        resultBox.classList.add('show');
    }

    function submitExam() {
        const unanswered = userAnswers.some(a => a === null);
        if (unanswered) {
            if (!confirm('Bạn còn ' + userAnswers.filter(a => a === null).length + ' câu chưa trả lời. Bạn có chắc muốn nộp bài?')) {
                return;
            }
        }
        submitted = true;
        render();
        document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function resetExam() {
        if (submitted) {
            if (!confirm('Bạn có muốn làm lại từ đầu? Kết quả hiện tại sẽ bị mất.')) return;
        }
        userAnswers.fill(null);
        submitted = false;
        resultBox.classList.remove('show');
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Khởi tạo
    render();
</script>
