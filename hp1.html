<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trắc nghiệm QP1 - Tự chấm ngay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            padding: 28px 24px 36px;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #e6edf4;
            padding-bottom: 18px;
            margin-bottom: 24px;
        }
        h1 i {
            color: #2a7de1;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 28px;
            background: #f8fafd;
            padding: 14px 22px;
            border-radius: 60px;
            margin-bottom: 28px;
            font-size: 15px;
            font-weight: 500;
            color: #1e3a5f;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats i {
            color: #2a7de1;
            width: 20px;
            text-align: center;
        }
        .stats .score {
            font-weight: 700;
            color: #1a5fb0;
        }
        .question-item {
            background: #ffffff;
            border: 1px solid #e2e9f2;
            border-radius: 16px;
            padding: 20px 22px 18px;
            margin-bottom: 18px;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0, 20, 40, 0.02);
        }
        .question-item:hover {
            border-color: #b8d0e8;
            background: #fafcff;
        }
        .question-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 17px;
            color: #0b2b4a;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .question-header .qnum {
            background: #eef4fc;
            color: #1a5fb0;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
        }
        .question-header .result-badge {
            font-size: 14px;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 30px;
            margin-left: 8px;
        }
        .result-badge.correct {
            background: #d4edda;
            color: #155724;
        }
        .result-badge.wrong {
            background: #f8dddd;
            color: #721c24;
        }
        .question-text {
            font-size: 16px;
            line-height: 1.6;
            color: #1c2f44;
            margin-bottom: 14px;
            padding-left: 4px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 6px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 16px 8px 12px;
            border-radius: 40px;
            background: #f6f9fe;
            border: 1px solid transparent;
            transition: 0.1s;
            cursor: pointer;
            font-size: 15px;
            color: #1d344b;
        }
        .option:hover {
            background: #eaf1fc;
            border-color: #b8d0e8;
        }
        .option input[type="radio"] {
            accent-color: #1a5fb0;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .option .letter {
            font-weight: 700;
            color: #1a5fb0;
            min-width: 22px;
        }
        .option .answer-text {
            flex: 1;
        }
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        .option.wrong {
            background: #f8dddd;
            border-color: #dc3545;
        }
        .option.disabled {
            opacity: 0.85;
            cursor: default;
        }
        .option.disabled:hover {
            background: #f6f9fe;
            border-color: transparent;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            gap: 16px;
            border-top: 1px solid #e2e9f2;
            padding-top: 28px;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            background: #eef3f9;
            color: #1e3a5f;
        }
        .btn-primary {
            background: #1a5fb0;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0f4a8f;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(26, 95, 176, 0.25);
        }
        .btn-success {
            background: #1e7e34;
            color: #fff;
        }
        .btn-success:hover {
            background: #146128;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(30, 126, 52, 0.25);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #b8cfe5;
        }
        .btn-outline:hover {
            background: #e6eff9;
            border-color: #2a7de1;
        }

        .result-box {
            background: #eef4fc;
            border-radius: 16px;
            padding: 18px 24px;
            margin-top: 24px;
            display: block;
            border-left: 6px solid #1a5fb0;
        }
        .result-box .score {
            font-size: 22px;
            font-weight: 700;
            color: #0b2b4a;
        }
        .result-box .detail {
            margin-top: 8px;
            font-size: 15px;
            color: #1d3b5c;
        }

            .container { padding: 18px 12px 28px; }
            .question-item { padding: 16px 14px; }
            .stats { font-size: 13px; padding: 10px 16px; gap: 8px 16px; }
            .btn { padding: 10px 20px; font-size: 14px; }
            .action-bar { flex-direction: column; align-items: stretch; }
            .action-bar .btn { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        <i class="fas fa-graduation-cap"></i>

    <div id="questionsContainer"></div>

    <div class="action-bar">

        <div class="detail" id="resultDetail"></div>
    </div>
</div>

            ],

            options: [

        },
        {

                'Biện pháp xây dựng quân đội kiểu mới của V.I.Lênin.'

        {

        {
            id: 65,
            q: 'Theo quan điểm của chủ nghĩa C.Mác - V.I.Lênin nguồn gốc nảy sinh chiến tranh?',
            options: [
                'Chế độ công hữu về tư liệu sản xuất và sự tồn tại của nhà nước.',
                'Chế độ tư hữu về tư liệu sản xuất và sự tồn tại của giai cấp và đối kháng giai cấp.',
                'Bản năng sinh vật của con người.',

    // ============================================================
    // Ứng dụng
    // ============================================================
    const app = {
        data: questions,
        userAnswers: new Array(questions.length).fill(null),
        isCorrect: new Array(questions.length).fill(null),

        init() {
            this.renderQuestions();
            this.updateStats();
            this.bindEvents();
            this.updateScoreDisplay();
        },

        renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            this.data.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.dataset.index = idx;

                const optionsHtml = q.options.map((opt, optIdx) => `
                    <label class="option" data-q="${idx}" data-opt="${optIdx}">
                        <input type="radio" name="q${idx}" value="${optIdx}" />
                        <span class="letter">${String.fromCharCode(65 + optIdx)}.</span>
                        <span class="answer-text">${opt}</span>
                    </label>
                `).join('');

                div.innerHTML = `
                    <div class="question-header">
                        <span class="qnum">Câu ${idx+1}</span>
                        <span style="font-weight:400; color:#5b7b9c; font-size:14px;">(ID ${q.id})</span>
                        <span class="result-badge" id="badge-${idx}" style="display:none;"></span>
                    </div>
                    <div class="question-text">${q.q}</div>
                    <div class="options">${optionsHtml}</div>
                `;
                container.appendChild(div);
            });
        },

        updateStats() {
            const total = this.data.length;
            document.getElementById('totalQ').textContent = total;
            const answered = this.userAnswers.filter(a => a !== null).length;
            document.getElementById('answeredCount').textContent = answered;
        },

        updateScoreDisplay() {
            const total = this.data.length;
            const correct = this.isCorrect.filter(v => v === true).length;
            document.getElementById('liveScore').textContent = correct;
            document.getElementById('scoreDisplay').textContent = `Điểm: ${correct} / ${total}`;
            const percent = total > 0 ? Math.round((correct / total) * 100) : 0;
            document.getElementById('resultDetail').textContent = `Bạn đã trả lời đúng ${correct}/${total} câu (${percent}%).`;
        },

        bindEvents() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const label = e.target.closest('.option');
                    const qIdx = parseInt(label.dataset.q);
                    const optIdx = parseInt(label.dataset.opt);
                    // Xóa trạng thái cũ
                    document.querySelectorAll(`.option[data-q="${qIdx}"]`).forEach(opt => {
                        opt.classList.remove('correct', 'wrong');
                    });
                    const correctAns = this.data[qIdx].answer;
                    const isCorrect = (optIdx === correctAns);
                    this.userAnswers[qIdx] = optIdx;
                    this.isCorrect[qIdx] = isCorrect;

                    const badge = document.getElementById(`badge-${qIdx}`);
                    badge.style.display = 'inline-block';
                    if (isCorrect) {
                        badge.textContent = 'Đúng';
                        badge.className = 'result-badge correct';
                        label.classList.add('correct');
                    } else {
                        badge.textContent = 'Sai';
                        badge.className = 'result-badge wrong';
                        label.classList.add('wrong');
                        // Tô đáp án đúng
                        document.querySelectorAll(`.option[data-q="${qIdx}"]`).forEach(opt => {
                            if (parseInt(opt.dataset.opt) === correctAns) {
                                opt.classList.add('correct');
                            }
                        });
                    }

                    this.updateStats();
                    this.updateScoreDisplay();
                });
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                this.resetExam();
            });

            document.getElementById('showAnswerBtn').addEventListener('click', () => {
                this.revealAnswers();
            });
        },

        resetExam() {
            this.userAnswers.fill(null);
            this.isCorrect.fill(null);
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('correct', 'wrong');
                const radio = opt.querySelector('input[type="radio"]');
                if (radio) radio.checked = false;
            });
            document.querySelectorAll('.result-badge').forEach(b => {
                b.style.display = 'none';
                b.className = 'result-badge';
                b.textContent = '';
            });
            this.updateStats();
            this.updateScoreDisplay();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        revealAnswers() {
            document.querySelectorAll('.option').forEach(opt => {
                const qIdx = parseInt(opt.dataset.q);
                const optIdx = parseInt(opt.dataset.opt);
                const correctAns = this.data[qIdx].answer;
                if (optIdx === correctAns) {
                    opt.classList.add('correct');
                }
            });
            alert('Đã hiển thị đáp án đúng (màu xanh) cho tất cả câu hỏi.');
        }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
</script>
