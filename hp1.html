<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trắc nghiệm QP1 - Azota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            padding: 28px 24px 36px;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #e6edf4;
            padding-bottom: 18px;
            margin-bottom: 24px;
        }
        h1 i {
            color: #2a7de1;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 28px;
            background: #f8fafd;
            padding: 14px 22px;
            border-radius: 60px;
            margin-bottom: 28px;
            font-size: 15px;
            font-weight: 500;
            color: #1e3a5f;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats i {
            color: #2a7de1;
            width: 20px;
            text-align: center;
        }
        .question-item {
            background: #ffffff;
            border: 1px solid #e2e9f2;
            border-radius: 16px;
            padding: 20px 22px 18px;
            margin-bottom: 18px;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0, 20, 40, 0.02);
        }
        .question-item:hover {
            border-color: #b8d0e8;
            background: #fafcff;
        }
        .question-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 17px;
            color: #0b2b4a;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .question-header .qnum {
            background: #eef4fc;
            color: #1a5fb0;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
        }
        .question-header .result-badge {
            font-size: 14px;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 30px;
            margin-left: 8px;
        }
        .result-badge.correct {
            background: #d4edda;
            color: #155724;
        }
        .result-badge.wrong {
            background: #f8dddd;
            color: #721c24;
        }
        .question-text {
            font-size: 16px;
            line-height: 1.6;
            color: #1c2f44;
            margin-bottom: 14px;
            padding-left: 4px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 6px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 16px 8px 12px;
            border-radius: 40px;
            background: #f6f9fe;
            border: 1px solid transparent;
            transition: 0.1s;
            cursor: pointer;
            font-size: 15px;
            color: #1d344b;
        }
        .option:hover {
            background: #eaf1fc;
            border-color: #b8d0e8;
        }
        .option input[type="radio"] {
            accent-color: #1a5fb0;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .option .letter {
            font-weight: 700;
            color: #1a5fb0;
            min-width: 22px;
        }
        .option .answer-text {
            flex: 1;
        }
        .option.selected {
            background: #ddeeff;
            border-color: #2a7de1;
        }
        .option.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        .option.wrong {
            background: #f8dddd;
            border-color: #dc3545;
        }
        .option.disabled {
            opacity: 0.85;
            cursor: default;
        }
        .option.disabled:hover {
            background: #f6f9fe;
            border-color: transparent;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            gap: 16px;
            border-top: 1px solid #e2e9f2;
            padding-top: 28px;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            background: #eef3f9;
            color: #1e3a5f;
        }
        .btn-primary {
            background: #1a5fb0;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0f4a8f;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(26, 95, 176, 0.25);
        }
        .btn-success {
            background: #1e7e34;
            color: #fff;
        }
        .btn-success:hover {
            background: #146128;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(30, 126, 52, 0.25);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #b8cfe5;
        }
        .btn-outline:hover {
            background: #e6eff9;
            border-color: #2a7de1;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: none !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        .result-box {
            background: #eef4fc;
            border-radius: 16px;
            padding: 18px 24px;
            margin-top: 24px;
            display: none;
            border-left: 6px solid #1a5fb0;
        }
        .result-box.show {
            display: block;
        }
        .result-box .score {
            font-size: 22px;
            font-weight: 700;
            color: #0b2b4a;
        }
        .result-box .detail {
            margin-top: 8px;
            font-size: 15px;
            color: #1d3b5c;
        }

        @media (max-width: 640px) {
            .container {
                padding: 18px 12px 28px;
            }
            .question-item {
                padding: 16px 14px;
            }
            .stats {
                font-size: 13px;
                padding: 10px 16px;
                gap: 8px 16px;
            }
            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-bar .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        <i class="fas fa-graduation-cap"></i>
        Trắc nghiệm QP1
        <span style="font-size:14px; font-weight:400; margin-left:auto; color:#5b7b9c;">
            <i class="fas fa-clock"></i> 45 phút
        </span>
    </h1>

    <div class="stats">
        <span><i class="fas fa-list-ul"></i> <span id="totalQ">0</span> câu</span>
        <span><i class="fas fa-check-circle"></i> Đã làm: <span id="answeredCount">0</span></span>
        <span><i class="fas fa-flag"></i> Bài: QP1</span>
    </div>

    <div id="questionsContainer"></div>

    <div class="action-bar">
        <div>
            <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo-alt"></i> Làm lại</button>
        </div>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn btn-primary" id="submitBtn"><i class="fas fa-paper-plane"></i> Nộp bài</button>
            <button class="btn btn-success" id="showAnswerBtn" disabled><i class="fas fa-eye"></i> Xem đáp án</button>
        </div>
    </div>

    <div class="result-box" id="resultBox">
        <div class="score" id="scoreDisplay">Điểm: 0 / 0</div>
        <div class="detail" id="resultDetail"></div>
    </div>
</div>

<script>
    // ============================================================
    // Dữ liệu câu hỏi (trích từ tài liệu QP1)
    // ============================================================
    const questions = [
        // Trang 1
        { id: 1, q: 'Thực trạng của lực lượng vũ trang nhân dân trong giai đoạn hiện nay là một trong những:',
          a: 'Nhiệm vụ xây dựng lực lượng công an nhân dân trong điều kiện khu vực Đông Nam Á đã thay biến phức tạp.',
          b: 'Yêu cầu xây dựng lực lượng vũ trang nhân dân trong điều kiện khu vực Đông Nam Á đã thay đổi nhiều diễn biến phức tạp.',
          c: 'Biện pháp xây dựng lực lượng vũ trang trong điều kiện đất nước đã thay đổi có nhiều diễn biến phức tạp.',
          d: 'Đặc điểm liên quan đến xây dựng lực lượng vũ trang nhân dân Việt Nam.',
          ans: 3 },
        { id: 2, q: 'Lực lượng vũ trang nhân dân là các tổ chức vũ trang và bán vũ trang của nhân dân Việt Nam do tổ chức nào lãnh đạo?',
          a: 'Đảng Cộng sản Việt Nam.',
          b: 'Quốc hội nước cộng hòa xã hội chủ nghĩa Việt Nam.',
          c: 'Nhà nước cộng hòa xã hội chủ nghĩa Việt Nam.',
          d: 'Mặt trận Tổ quốc Việt Nam.',
          ans: 0 },
        { id: 3, q: 'Đảm bảo cho lực lượng vũ trang luôn trong tư thế sẵn sàng chiến đấu và chiến đấu thắng lợi được xác định là một trong những:',
          a: 'Phương hướng lãnh đạo của Đảng đối với lực lượng vũ trang.',
          b: 'Phương châm hành động cách mạng của quân đội.',
          c: 'Giải pháp chiến đấu của công an nhân dân.',
          d: 'Quan điểm, nguyên tắc cơ bản trong xây dựng lực lượng vũ trang nhân dân ta hiện nay.',
          ans: 3 },
        { id: 4, q: 'Phương hướng xây dựng quân đội nhân dân Việt Nam hiện nay:',
          a: 'Cách mạng, chính qui, tinh nhuệ, từng bước hiện đại.',
          b: 'Mua sắm vũ khí trang bị hiện đại cho quân đội.',
          c: 'Nhanh chóng hiện đại hóa vũ khí trang bị cho quân đội.',
          d: 'Chú trọng xây dựng đời sống văn hóa tinh thần của quân đội.',
          ans: 0 },
        { id: 5, q: 'Đảng lãnh đạo lực lượng vũ trang nhân dân Việt Nam theo nguyên tắc?',
          a: 'Tuyệt đối, toàn diện.',
          b: 'Tuyệt đối và trực tiếp.',
          c: 'Tuyệt đối, trực tiếp về mọi mặt.',
          d: 'Trực tiếp về mọi mặt.',
          ans: 2 },
        { id: 6, q: 'Đội quân chiến đấu, đội quân công tác, đội quân sản xuất. Được xác định là:',
          a: 'Biện pháp xây dựng quân đội.',
          b: 'Nhiệm vụ của quân đội.',
          c: 'Chức năng của quân đội.',
          d: 'Nguyên tắc xây dựng của quân đội.',
          ans: 2 },
        { id: 7, q: 'Một trong những quan điểm, nguyên tắc của Đảng về xây dựng lực lượng vũ trang nhân dân Việt Nam là:',
          a: 'Lấy chất lượng là chính, lấy xây dựng chính trị làm cơ sở.',
          b: 'Lấy số lượng là chính, lấy xây dựng chính trị làm cơ sở.',
          c: 'Lấy chất lượng là chính, lấy xây dựng quân sự làm cơ sở.',
          d: 'Lấy số lượng là chính, lấy xây dựng quân sự làm cơ sở.',
          ans: 0 },
        { id: 8, q: 'Tổ chức các đơn vị lực lượng vũ trang:',
          a: 'Nhanh, mạnh, chính xác.',
          b: 'Tinh gọn, có sức cơ động nhanh.',
          c: 'Bảo đảm số lượng, chất lượng.',
          d: 'Gọn, mạnh, cơ động.',
          ans: 3 },
        // Trang 2
        { id: 9, q: 'Xây dựng đội ngũ cán bộ lực lượng vũ trang nhân dân có:',
          a: 'Trình độ khoa học cao.',
          b: 'Phẩm chất, năng lực tốt.',
          c: 'Trình độ chuyên môn giỏi.',
          d: 'Thể lực tốt.',
          ans: 1 },
        { id: 10, q: 'Tổ chức các đơn vị lực lượng vũ trang phù hợp với:',
          a: 'Tình hình thế giới, khu vực và thế trận cả nước.',
          b: 'Tình hình cụ thể khu vực và thế trận cả nước.',
          c: 'Tình hình trong nước, khu vực và thế trận cả nước.',
          d: 'Tình hình cụ thể ở từng địa phương, khu vực và thế trận cả nước.',
          ans: 3 },
        { id: 11, q: 'Chiến lược bảo vệ tổ quốc xác định: “ tập trung xây dựng Lực lượng quân đội, công an có bản lĩnh chính trị vững vàng, lòng trung thành tuyệt đối với Đảng, Tổ quốc và nhân dân..” hội nghị lần thứ mấy, khóa bao nhiêu của BCH TƯ Đảng xác định?',
          a: 'Hội nghị lần thứ 7, khóa VIII.',
          b: 'Hội nghị lần thứ 8, khóa IX.',
          c: 'Hội nghị lần thứ 9, khóa X.',
          d: 'Hội nghị lần thứ 10, khóa XI.',
          ans: 1 },
        { id: 12, q: 'Quân đội nhân dân Việt Nam gồm có mấy Quân khu, Quân đoàn?',
          a: '05 Quân khu, 02 Quân đoàn.',
          b: '06 Quân khu, 03 Quân đoàn.',
          c: '07 Quân khu, 04 Quân đoàn.',
          d: '08 Quân khu, 05 Quân đoàn.',
          ans: 2 },
        { id: 13, q: 'Vì sao sự lãnh đạo của Đảng CS đối với lực lượng vũ trang là nguyên tắc quan trọng nhất?',
          a: 'Quyết định đến sự trưởng thành của quân đội nhân dân.',
          b: 'Quyết định đến mục tiêu, phương hướng chiến đấu.',
          c: 'Quyết định sức mạnh, sự tồn tại, phát triển, chiến đấu, chiến thắng của LLVT.',
          d: 'Quyết định đến cơ chế hoạt động của công an nhân dân.',
          ans: 2 },
        { id: 14, q: 'Quân đội nhân dân Việt Nam hiện nay có mấy Quân chủng, Bình chủng?',
          a: '05 Quân chủng, 02 Bình chủng.',
          b: '02 Quân chủng, 05 Bình chủng.',
          c: '03 Quân chủng, 06 Bình chủng.',
          d: '06 Quân chủng, 03 Bình chủng.',
          ans: 1 },
        { id: 15, q: 'Giữ vững và tăng cường sự lãnh đạo của Đảng Cộng sản Việt Nam đối với lực lượng vũ trang nhân dân Việt Nam. Được xác định là:',
          a: 'Biện pháp xây dựng lực lượng vũ trang nhân dân.',
          b: 'Nội dung, nhiệm vụ xây dựng lực lượng vũ trang nhân dân.',
          c: 'Quan điểm, nguyên tắc xây dựng lực lượng vũ trang nhân dân.',
          d: 'Phương hướng xây dựng lực lượng vũ trang nhân dân.',
          ans: 2 },
        { id: 16, q: 'Đứng trước diễn biến của tình hình, có khả năng phân tích và kết luận chính xác đúng, sai từ đó có thái độ đúng đắn với sự việc đó. Được xác định là:',
          a: 'Tinh nhuệ về kĩ thuật của lực lượng vũ trang nhân dân.',
          b: 'Tinh nhuệ về chính trị của lực lượng vũ trang nhân dân.',
          c: 'Tinh nhuệ về chiến thuật của lực lượng vũ trang nhân dân.',
          d: 'Tất cả các phương án trên đúng.',
          ans: 1 },
        { id: 17, q: 'Xây dựng quân đội nhân dân, công an nhân dân chính quy là:',

          b: 'Thực hiện thống nhất về chính trị, quân sự, hậu cần.',

          ans: 0 },
        // Trang 3
        { id: 18, q: 'Một trong những nội dung xây dựng quân đội cách mạng là:',
          a: 'Xây dựng lòng tự hào, tự tôn dân tộc.',
          b: 'Xây dựng truyền thống đánh giá các giữ nước.',
          c: 'Xây dựng truyền thống quân đội của dân, đo dân, vì dân.',

          ans: 3 },
        { id: 19, q: 'Một trong những đặc điểm liên quan đến việc xây dựng lực lượng vũ trang nhân dân Việt Nam hiện nay?',

          ans: 0 },
        { id: 20, q: 'Lực lượng vũ trang nhân dân Việt Nam bao gồm:',
          a: 'Quân đội nhân dân, công an nhân dân, dân quân tự vệ.',
          b: 'Quân đội nhân dân, dự bị động viên, dân quân tự vệ.',

          d: 'Không quân, cảnh sát biển, dân quân tự vệ.',

        { id: 21, q: '“Chính trị trọng hơn quân sự” được Chủ tịch Hồ Chí Minh viết trong chỉ thị?',
          a: 'Thành lập lực lượng Việt Minh.',
          b: 'Thành lập lực lượng vũ trang địa phương.',
          c: 'Thành lập đội Việt Nam tuyên truyền giải phóng quân.',
          d: 'Thành lập lực lượng vũ trang ba thứ quân.',
          ans: 2 },
        { id: 22, q: 'Xây dựng quân đội về chính trị trong đó vấn đề nào là cốt lõi?',
          a: 'Bản chất giai cấp công nhân.',
          b: 'Tính nhân dân.',
          c: 'Tính dân tộc.',
          d: 'Phương án b, c đúng.',
          ans: 0 },
        { id: 23, q: '“Dân tộc Việt Nam nhất định phải được giải phóng. Muốn đánh chúng phải có lực lượng quân sự, phải có tổ chức”. Ai khẳng định?',
          a: 'Chủ tịch Hồ Chí Minh.',
          b: 'Đại tướng Võ Nguyên Giáp.',
          c: 'Đại tướng Nguyễn Chí Thanh.',

    // ============================================================
    // Ứng dụng
    // ============================================================
    const app = {
        data: questions,
        userAnswers: new Array(questions.length).fill(null),
        isSubmitted: false,

        init() {
            this.renderQuestions();
            this.updateStats();
            this.bindEvents();
        },

        renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            this.data.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'question-item';
                div.dataset.index = idx;

                const optionsHtml = ['a', 'b', 'c', 'd'].map((letter, optIdx) => {
                    const text = q[letter];
                    if (!text) return '';
                    return `
                        <label class="option" data-q="${idx}" data-opt="${optIdx}">
                            <input type="radio" name="q${idx}" value="${optIdx}" />
                            <span class="letter">${letter.toUpperCase()}.</span>
                            <span class="answer-text">${text}</span>
                        </label>
                    `;
                }).join('');

                div.innerHTML = `
                    <div class="question-header">
                        <span class="qnum">Câu ${idx+1}</span>
                        <span style="font-weight:400; color:#5b7b9c; font-size:14px;">${q.id}</span>
                        <span class="result-badge" id="badge-${idx}" style="display:none;"></span>
                    </div>
                    <div class="question-text">${q.q}</div>
                    <div class="options">${optionsHtml}</div>
                `;
                container.appendChild(div);
            });
        },

        updateStats() {
            document.getElementById('totalQ').textContent = this.data.length;
            const answered = this.userAnswers.filter(a => a !== null).length;
            document.getElementById('answeredCount').textContent = answered;
        },

        bindEvents() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (this.isSubmitted) return;
                    const label = e.target.closest('.option');
                    const qIdx = parseInt(label.dataset.q);
                    const optIdx = parseInt(label.dataset.opt);
                    document.querySelectorAll(`.option[data-q="${qIdx}"]`).forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    label.classList.add('selected');
                    this.userAnswers[qIdx] = optIdx;
                    this.updateStats();
                });
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                if (this.isSubmitted) {
                    if (!confirm('Bạn đã nộp bài. Làm lại sẽ xóa kết quả. Tiếp tục?')) return;
                }
                this.resetExam();
            });

            document.getElementById('submitBtn').addEventListener('click', () => {
                if (this.isSubmitted) {
                    alert('Bạn đã nộp bài rồi! Hãy nhấn "Làm lại" để làm mới.');
                    return;
                }
                const unanswered = this.userAnswers.some(a => a === null);
                if (unanswered) {
                    if (!confirm('Bạn chưa trả lời hết câu hỏi. Vẫn muốn nộp bài?')) return;
                }
                this.submitExam();
            });

            document.getElementById('showAnswerBtn').addEventListener('click', () => {
                if (!this.isSubmitted) {
                    alert('Bạn cần nộp bài trước khi xem đáp án.');
                    return;
                }
                this.revealAnswers();
            });
        },

        resetExam() {
            this.isSubmitted = false;
            this.userAnswers.fill(null);
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected', 'correct', 'wrong', 'disabled');
                const radio = opt.querySelector('input[type="radio"]');
                if (radio) radio.checked = false;
            });
            document.querySelectorAll('.result-badge').forEach(b => {
                b.style.display = 'none';
                b.className = 'result-badge';
            });
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('showAnswerBtn').disabled = true;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-paper-plane"></i> Nộp bài';
            this.updateStats();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        submitExam() {
            this.isSubmitted = true;
            let correct = 0;
            this.data.forEach((q, idx) => {
                const chosen = this.userAnswers[idx];
                if (chosen !== null && chosen === q.ans) correct++;
            });
            const total = this.data.length;
            document.getElementById('scoreDisplay').textContent = `Điểm: ${correct} / ${total}`;
            const percent = Math.round((correct / total) * 100);
            document.getElementById('resultDetail').textContent = `Bạn đã trả lời đúng ${correct}/${total} câu (${percent}%).`;

            const box = document.getElementById('resultBox');
            box.classList.add('show');

            // Đánh dấu từng câu và hiển thị badge Đúng/Sai
            document.querySelectorAll('.question-item').forEach((item, idx) => {
                const badge = document.getElementById(`badge-${idx}`);
                const chosen = this.userAnswers[idx];
                const isCorrect = (chosen !== null && chosen === this.data[idx].ans);
                if (chosen !== null) {
                    badge.style.display = 'inline-block';
                    if (isCorrect) {
                        badge.textContent = 'Đúng';
                        badge.className = 'result-badge correct';
                    } else {
                        badge.textContent = 'Sai';
                        badge.className = 'result-badge wrong';
                    }
                } else {
                    badge.style.display = 'inline-block';
                    badge.textContent = 'Chưa làm';
                    badge.className = 'result-badge';
                    badge.style.background = '#f0f0f0';
                    badge.style.color = '#6c757d';
                }
            });

            document.querySelectorAll('.option').forEach(opt => {
                const qIdx = parseInt(opt.dataset.q);
                const optIdx = parseInt(opt.dataset.opt);
                const radio = opt.querySelector('input[type="radio"]');
                radio.disabled = true;
                opt.classList.add('disabled');

                const correctAns = this.data[qIdx].ans;
                if (optIdx === correctAns) {
                    opt.classList.add('correct');
                } else if (optIdx === this.userAnswers[qIdx] && this.userAnswers[qIdx] !== correctAns) {
                    opt.classList.add('wrong');
                }
                if (optIdx === this.userAnswers[qIdx] && this.userAnswers[qIdx] === correctAns) {
                    opt.classList.add('correct');
                }
            });

            document.getElementById('showAnswerBtn').disabled = false;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-check-circle"></i> Đã nộp';
            this.updateStats();
        },

        revealAnswers() {
            document.querySelectorAll('.option').forEach(opt => {
                const qIdx = parseInt(opt.dataset.q);
                const optIdx = parseInt(opt.dataset.opt);
                const correctAns = this.data[qIdx].ans;
                if (optIdx === correctAns) {
                    opt.classList.add('correct');
                }
            });
            alert('Đã hiển thị đáp án đúng (màu xanh).');
        }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
</script>
